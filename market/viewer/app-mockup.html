<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Peel · Live Map · Mockup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--
    H8 Commit 2 — static mockup for the Mapbox-based live map viewer.

    This file is a STANDALONE design target. It has:
      - no /state fetch, no polling, no agent wiring
      - hand-written fake offers / trades / transcript entries inline
      - Mapbox token embedded directly (static mockup only; the live
        app.html in C4 will have it injected from process.env)

    Open it directly in a browser (file://...) to eyeball the design.
    The live wiring in C4 swaps the inline MOCK object for /state JSON.

    Privacy constraint (from the briefing — load-bearing):
      - NO per-kitchen inventory
      - NO HBAR balance
      - NO usage forecast
      - NO surplus calculation
    Only publicly broadcast envelopes (OFFER / PROPOSAL / TRADE_EXECUTED /
    REASONING) are fair game.
  -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>
  <style>
    /* --- Peel palette (OKLCH) — copied from H3/H7 for cross-surface
           coherence. Same variables, same kitchen-color mapping, so the
           console + three-panel + map surfaces all feel like one product. */
    :root {
      --paper:    oklch(97% 0.01 95);
      --paper-2:  oklch(95% 0.015 95);
      --paper-3:  oklch(92% 0.025 100);
      --ink:      oklch(25% 0.03 150);
      --ink-dim:  oklch(55% 0.02 150);
      --ink-mute: oklch(70% 0.015 145);
      --lime:     oklch(87% 0.18 120);
      --lime-dim: oklch(92% 0.12 120);
      --forest:   oklch(42% 0.14 145);
      --forest-2: oklch(32% 0.10 148);
      --coral:    oklch(70% 0.20 30);
      --coral-dim:oklch(82% 0.10 35);
      --border:   oklch(88% 0.015 95);
      --border-2: oklch(82% 0.02 100);
      /* Per-kitchen accents (hand-picked to match shared/hedera/kitchen-profiles.json) */
      --k-a: #A8D66B;
      --k-b: #F4A39A;
      --k-c: #5E8C6A;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      color: var(--ink);
      height: 100%;
    }
    body {
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.5;
      font-feature-settings: "ss01", "ss02", "tnum";
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .mono { font-family: "DM Mono", "SFMono-Regular", Menlo, monospace; }
    .serif { font-family: "Fraunces", Georgia, serif; }
    a { color: inherit; }

    /* ------------------------------------------------------------ */
    /*  Top bar                                                      */
    /* ------------------------------------------------------------ */
    header.topbar {
      padding: 18px 32px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      flex-shrink: 0;
      background: var(--paper);
      z-index: 10;
    }
    header.topbar .brand h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: 30px;
      margin: 0;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    header.topbar .brand .subtitle {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--forest);
      margin-top: 3px;
    }
    header.topbar .meta {
      font-family: "DM Mono", monospace;
      font-size: 11px;
      color: var(--ink-dim);
      text-align: right;
      letter-spacing: 0.04em;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
    }
    header.topbar .meta .live {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--forest);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 10px;
    }
    header.topbar .meta .live .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--lime);
      box-shadow: 0 0 0 0 var(--lime);
      animation: pulse 2.4s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 oklch(87% 0.18 120 / 0.6); }
      70%  { box-shadow: 0 0 0 9px oklch(87% 0.18 120 / 0); }
      100% { box-shadow: 0 0 0 0 oklch(87% 0.18 120 / 0); }
    }

    /* ------------------------------------------------------------ */
    /*  Map                                                          */
    /* ------------------------------------------------------------ */
    #map {
      flex: 0 0 65vh;
      width: 100%;
      background: var(--paper-2);
      position: relative;
    }
    /* Fade the top of the drawer into the map a little so the
       boundary isn't a hard line. */
    #map::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 24px;
      background: linear-gradient(to bottom, transparent, oklch(97% 0.01 95 / 0.7));
      pointer-events: none;
    }

    /* ------------------------------------------------------------ */
    /*  Kitchen pins (DOM-based custom markers)                      */
    /* ------------------------------------------------------------ */
    .pin {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 6px 8px;
      background: var(--paper);
      border: 1px solid var(--border-2);
      border-radius: 999px;
      box-shadow: 0 2px 8px oklch(25% 0.03 150 / 0.08),
                  0 1px 2px oklch(25% 0.03 150 / 0.06);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      font-family: "DM Sans", sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      user-select: none;
    }
    .pin:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px oklch(25% 0.03 150 / 0.14),
                  0 2px 4px oklch(25% 0.03 150 / 0.08);
    }
    .pin .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    /* Pulse when recent trade activity. Reused keyframe, tinted per accent. */
    .pin.active .dot {
      animation: pinpulse 1.8s ease-out infinite;
    }
    @keyframes pinpulse {
      0%   { box-shadow: 0 0 0 0 currentColor; }
      70%  { box-shadow: 0 0 0 8px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    .pin.k-A .dot { background: var(--k-a); color: var(--k-a); }
    .pin.k-B .dot { background: var(--k-b); color: var(--k-b); }
    .pin.k-C .dot { background: var(--k-c); color: var(--k-c); }

    /* ------------------------------------------------------------ */
    /*  Mapbox popup override                                        */
    /* ------------------------------------------------------------ */
    /* Mapbox defaults to overflow:hidden on the map container, which clips
       tall popups when a pin sits near the top of the map. Allowing visible
       overflow lets the popup escape the map area and sit over the drawer.
       The inner canvas still has its own clipping, so tiles don't leak. */
    .mapboxgl-map { overflow: visible !important; }
    .mapboxgl-popup { z-index: 20; }  /* sit above header + drawer */
    .mapboxgl-popup-content {
      padding: 0;
      border-radius: 14px;
      box-shadow: 0 10px 32px oklch(25% 0.03 150 / 0.16),
                  0 2px 6px oklch(25% 0.03 150 / 0.08);
      border: 1px solid var(--border-2);
      background: var(--paper);
      max-width: 380px;
      font-family: "DM Sans", sans-serif;
    }
    .mapboxgl-popup-close-button {
      font-size: 22px;
      padding: 6px 10px;
      color: var(--ink-dim);
    }
    .mapboxgl-popup-close-button:hover {
      background: transparent;
      color: var(--ink);
    }
    .mapboxgl-popup-tip {
      border-top-color: var(--paper) !important;
      border-bottom-color: var(--paper) !important;
    }

    /* ------------------------------------------------------------ */
    /*  Popup card                                                   */
    /* ------------------------------------------------------------ */
    .card { width: 360px; }
    .card .card-header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: flex-start;
    }
    .card .accent-pill {
      width: 4px;
      align-self: stretch;
      border-radius: 2px;
      min-height: 44px;
    }
    .card .card-header .name {
      font-family: "Fraunces", Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1.2;
    }
    .card .card-header .branch {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-dim);
      margin-top: 4px;
    }
    .card .card-header .tag {
      font-size: 12px;
      color: var(--ink-dim);
      margin-top: 5px;
      font-style: italic;
    }

    .card .section {
      padding: 14px 18px 14px;
      border-bottom: 1px solid var(--border);
    }
    .card .section:last-child { border-bottom: none; }
    .card .section .label {
      font-family: "DM Mono", monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-mute);
      margin-bottom: 8px;
    }

    .card .offer-row,
    .card .settle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-family: "DM Mono", monospace;
      font-size: 11px;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card .offer-row .ing,
    .card .settle-row .ing {
      color: var(--forest);
      background: var(--lime-dim);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
    }
    .card .offer-row .price,
    .card .settle-row .amount {
      color: var(--ink-dim);
    }
    .card .offer-row .grow,
    .card .settle-row .grow { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .card .settle-row .ts {
      color: var(--ink-mute);
      font-size: 10px;
    }
    .card .empty {
      font-family: "DM Sans", sans-serif;
      font-size: 12px;
      color: var(--ink-mute);
      font-style: italic;
    }
    .card .more {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      color: var(--ink-mute);
      padding-top: 3px;
    }

    /* Tiny HashScan chip — reused in list rows AND inside SVG overlay */
    .hs-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border: 1px solid var(--forest);
      border-radius: 4px;
      text-decoration: none;
      color: var(--forest);
      font-family: "DM Mono", monospace;
      font-size: 9px;
      background: var(--paper-2);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background 0.12s ease, transform 0.08s ease;
      flex-shrink: 0;
      line-height: 1;
    }
    .hs-chip:hover { background: var(--lime); transform: translateY(-1px); }

    /* ------------------------------------------------------------ */
    /*  Trade network SVG                                            */
    /* ------------------------------------------------------------ */
    .network-wrap {
      position: relative;
      display: block;
      margin: 4px auto 2px;
      width: 100%;
      max-width: 320px;
    }
    .network-wrap svg { display: block; width: 100%; height: auto; }
    .network-wrap .edge-anchor {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      pointer-events: none;  /* children re-enable */
    }
    .network-wrap .edge-anchor > * { pointer-events: auto; }
    .network-wrap .edge-label {
      background: var(--paper);
      border: 1px solid var(--border-2);
      border-radius: 11px;
      padding: 2px 8px;
      font-family: "DM Mono", monospace;
      font-size: 9px;
      color: var(--ink);
      white-space: nowrap;
      letter-spacing: 0.02em;
      box-shadow: 0 1px 3px oklch(25% 0.03 150 / 0.06);
    }
    .network-wrap .edge-label.dim {
      color: var(--ink-mute);
      border-style: dashed;
      background: transparent;
      font-style: italic;
    }
    .network-wrap .edge-anchor .hs-chip {
      padding: 1px 6px;
      font-size: 8px;
    }
    .network-wrap .node-label {
      position: absolute;
      transform: translate(-50%, 0);
      font-family: "DM Mono", monospace;
      font-size: 9px;
      color: var(--ink-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ------------------------------------------------------------ */
    /*  Transcript drawer                                            */
    /* ------------------------------------------------------------ */
    .drawer {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border);
      background: var(--paper-2);
    }
    .drawer-header {
      padding: 12px 32px;
      border-bottom: 1px solid var(--border);
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 32px 24px;
    }
    .drawer-body::-webkit-scrollbar { width: 8px; }
    .drawer-body::-webkit-scrollbar-track { background: transparent; }
    .drawer-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

    .thought-entry {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 18px;
      padding: 12px 0;
      border-bottom: 1px dashed var(--border);
      align-items: flex-start;
    }
    .thought-entry:last-child { border-bottom: none; }
    .thought-entry .ts-col {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      color: var(--ink-mute);
      padding-top: 4px;
      letter-spacing: 0.02em;
    }
    .thought-entry .body-col { min-width: 0; }
    .thought-entry .who {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-dim);
      margin-bottom: 4px;
    }
    .thought-entry .who .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .thought-entry.k-A .who .dot { background: var(--k-a); }
    .thought-entry.k-B .who .dot { background: var(--k-b); }
    .thought-entry.k-C .who .dot { background: var(--k-c); }
    .thought-entry .thought {
      font-family: "Fraunces", Georgia, serif;
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink);
      letter-spacing: -0.003em;
      max-width: 72ch;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Peel</h1>
      <div class="subtitle">live · three agents · testnet</div>
    </div>
    <div class="meta">
      <span class="live"><span class="dot"></span>live</span>
      <span id="trades-today">4 trades settled today</span>
      <span>updated 14:03:12 UTC</span>
    </div>
  </header>

  <div id="map"></div>

  <section class="drawer">
    <div class="drawer-header">
      <span>Agent reasoning · transcript topic</span>
      <span>3 kitchens</span>
    </div>
    <div class="drawer-body" id="drawer-body">
      <!-- populated from MOCK.transcript -->
    </div>
  </section>

  <script>
    /* ===============================================================
       MOCK DATA — hand-written. Commit 4 replaces this with /state.
       =============================================================== */
    const MOCK = {
      kitchens: {
        A: {
          id: "A", accountId: "0.0.8598874",
          displayName: "Dishoom", branch: "Shoreditch",
          tagline: "Bombay comfort food, all day",
          cuisine: "Indian",
          addressLine: "7 Boundary St",
          postcode: "London E2 7JE",
          lat: 51.5253, lng: -0.0766,
          accent: "#A8D66B"
        },
        B: {
          id: "B", accountId: "0.0.8598877",
          displayName: "Pret a Manger", branch: "Borough High St",
          tagline: "Fresh sandwiches, made daily",
          cuisine: "Café / deli",
          addressLine: "15 Borough High St",
          postcode: "London SE1 9SE",
          lat: 51.5043, lng: -0.0909,
          accent: "#F4A39A"
        },
        C: {
          id: "C", accountId: "0.0.8598879",
          displayName: "Wagamama", branch: "Covent Garden",
          tagline: "Ramen, katsu & donburi",
          cuisine: "Japanese",
          addressLine: "1a Tavistock St",
          postcode: "London WC2E 7PG",
          lat: 51.5117, lng: -0.1225,
          accent: "#5E8C6A"
        }
      },

      offers: [
        { offerId: "off_a1", kitchenId: "A", ingredient: "RICE",  qtyKg: 12, pricePerKgHbar: 0.90, hashscanUrl: "https://hashscan.io/testnet/topic/0.0.8598886/message/42" },
        { offerId: "off_b1", kitchenId: "B", ingredient: "PASTA", qtyKg:  8, pricePerKgHbar: 1.10, hashscanUrl: "https://hashscan.io/testnet/topic/0.0.8598886/message/45" }
        // C has no open offers → "No open offers"
      ],

      // Each trade has sellerId/buyerId resolved to kitchen letters. For the
      // demo the agoSec is hand-written; real data uses consensus_timestamp.
      trades: [
        { tradeId: "t_1", sellerId: "A", buyerId: "B", ingredient: "RICE",  qtyKg: 12, totalHbar: 10.80, agoSec: 120, hashscanUrl: "https://hashscan.io/testnet/transaction/0.0.8598874-1775951871-001001001" },
        { tradeId: "t_2", sellerId: "B", buyerId: "A", ingredient: "PASTA", qtyKg:  8, totalHbar:  8.40, agoSec: 260, hashscanUrl: "https://hashscan.io/testnet/transaction/0.0.8598877-1775951745-002002002" },
        { tradeId: "t_3", sellerId: "A", buyerId: "C", ingredient: "FLOUR", qtyKg:  5, totalHbar:  4.75, agoSec: 480, hashscanUrl: "https://hashscan.io/testnet/transaction/0.0.8598874-1775951510-003003003" },
        { tradeId: "t_4", sellerId: "C", buyerId: "A", ingredient: "OIL",   qtyKg:  3, totalHbar:  2.70, agoSec: 900, hashscanUrl: "https://hashscan.io/testnet/transaction/0.0.8598879-1775951100-004004004" }
      ],

      transcript: [
        { kitchenId: "A", agoSec:  30, thought: "My RICE line is 22 kg long against the three-day forecast. Posting 12 kg at 0.9 ℏ/kg — that's 10% below my ceiling but still above the policy floor, so it's a fair opening." },
        { kitchenId: "B", agoSec:  90, thought: "Dishoom's rice offer clears my surplus threshold for tomorrow's bowls. Counter-proposing at 0.90 flat — I'll take the full 12 kg." },
        { kitchenId: "A", agoSec: 120, thought: "Pret's counter matches my floor exactly. Accepting. Executing the atomic transfer — tokens out, HBAR in, single transaction." },
        { kitchenId: "C", agoSec: 180, thought: "I'm balanced on rice and pasta today. Only the flour line is trending heavy for Thursday service — holding the book and waiting for a decent counter before I post." },
        { kitchenId: "B", agoSec: 240, thought: "Trade settled. 12 kg RICE landed from Dishoom and the HBAR leg cleared in the same transaction. Waste forecast is back within tolerance." },
        { kitchenId: "A", agoSec: 300, thought: "FLOUR inventory at 18 kg — I'll need more before tomorrow's dinner service. Scanning the market topic for an open offer from one of the peers." }
      ]
    };

    /* ===============================================================
       DATA DERIVATIONS
       =============================================================== */
    function offersForKitchen(kid) {
      return MOCK.offers.filter(o => o.kitchenId === kid);
    }

    function settlementsForKitchen(kid) {
      // A "settlement" in the per-kitchen popup is any trade this kitchen
      // participated in (seller OR buyer), newest first.
      return MOCK.trades
        .filter(t => t.sellerId === kid || t.buyerId === kid)
        .slice()
        .sort((a, b) => a.agoSec - b.agoSec);
    }

    function laneFor(kid, peerId) {
      // Aggregate trades between this kitchen and one peer, either direction.
      const lane = MOCK.trades.filter(t =>
        (t.sellerId === kid && t.buyerId === peerId) ||
        (t.sellerId === peerId && t.buyerId === kid)
      );
      if (!lane.length) return { count: 0, qtyKg: 0, totalHbar: 0, recent: null, ingredient: null };
      // Sum up flows; for the ingredient label we use the most-recent trade's
      // ingredient (in the demo the lanes are single-ingredient anyway).
      let qtyKg = 0, totalHbar = 0;
      for (const t of lane) { qtyKg += t.qtyKg; totalHbar += t.totalHbar; }
      const recent = lane.slice().sort((a, b) => a.agoSec - b.agoSec)[0];
      return {
        count: lane.length,
        qtyKg: Math.round(qtyKg * 10) / 10,
        totalHbar: Math.round(totalHbar * 10) / 10,
        ingredient: recent.ingredient,
        recent
      };
    }

    function relTime(sec) {
      if (sec < 60) return `${sec}s ago`;
      if (sec < 3600) return `${Math.round(sec / 60)}m ago`;
      if (sec < 86400) return `${Math.round(sec / 3600)}h ago`;
      return `${Math.round(sec / 86400)}d ago`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    /* ===============================================================
       POPUP CARD COMPOSITION
       =============================================================== */
    function buildHeader(k) {
      return `
        <div class="card-header">
          <div class="accent-pill" style="background: ${k.accent};"></div>
          <div>
            <div class="name serif">${escapeHtml(k.displayName)}</div>
            <div class="branch mono">${escapeHtml(k.branch.toUpperCase())} · ${escapeHtml(k.postcode)}</div>
            <div class="tag">${escapeHtml(k.tagline)}</div>
          </div>
        </div>
      `;
    }

    function buildOffersSection(kid) {
      const offers = offersForKitchen(kid);
      let body;
      if (!offers.length) {
        body = `<div class="empty">No open offers</div>`;
      } else {
        const shown = offers.slice(0, 3);
        const extra = offers.length - shown.length;
        body = shown.map(o => `
          <div class="offer-row">
            <span class="ing">${o.ingredient}</span>
            <span class="grow">${o.qtyKg} kg @ ${o.pricePerKgHbar.toFixed(2)} ℏ/kg</span>
            <a class="hs-chip" href="${o.hashscanUrl}" target="_blank" rel="noopener">↗ HS</a>
          </div>
        `).join("");
        if (extra > 0) body += `<div class="more">· +${extra} more</div>`;
      }
      return `
        <div class="section">
          <div class="label">Open offers</div>
          ${body}
        </div>
      `;
    }

    function buildNetworkSection(kid) {
      const me = MOCK.kitchens[kid];
      const peerIds = ["A", "B", "C"].filter(id => id !== kid);
      const [p1, p2] = peerIds.map(id => MOCK.kitchens[id]);
      const lane1 = laneFor(kid, p1.id);
      const lane2 = laneFor(kid, p2.id);

      // Viewbox / anchor math
      const W = 320, H = 190;
      const cx = W / 2, cy = 42;               // center node (me) top-center
      const l1x = 50,  l1y = 142;              // peer 1 bottom-left
      const l2x = W - 50, l2y = 142;           // peer 2 bottom-right

      // Edge anchors for HTML-overlay labels — sit 62% of the way from me
      // toward each peer, which separates the two labels enough to avoid
      // the 360px popup's center-crowd problem.
      const T = 0.62;
      const mid1 = { x: cx + (l1x - cx) * T, y: cy + (l1y - cy) * T };
      const mid2 = { x: cx + (l2x - cx) * T, y: cy + (l2y - cy) * T };
      const toPct = (p) => ({ left: (p.x / W) * 100 + "%", top: (p.y / H) * 100 + "%" });
      const m1 = toPct(mid1), m2 = toPct(mid2);

      const anyTrades = lane1.count + lane2.count > 0;

      const edgeAttrs = (lane, peerAccent) => lane.count > 0
        ? `stroke="${peerAccent}" stroke-width="2.5"`
        : `stroke="#cbd0c8" stroke-width="1.5" stroke-dasharray="5 4"`;

      const edgeAnnotation = (lane) => {
        if (lane.count === 0) {
          return `<span class="edge-label dim">no trades yet</span>`;
        }
        const tradeWord = lane.count === 1 ? "trade" : "trades";
        return `
          <span class="edge-label">${lane.qtyKg} kg · ${lane.totalHbar.toFixed(1)} ℏ · ${lane.count} ${tradeWord}</span>
          <a class="hs-chip" href="${lane.recent.hashscanUrl}" target="_blank" rel="noopener">↗ HS</a>
        `;
      };

      if (!anyTrades) {
        return `
          <div class="section">
            <div class="label">Trade network</div>
            <div class="empty">No trades yet — agent is idle or scanning</div>
          </div>
        `;
      }

      return `
        <div class="section">
          <div class="label">Trade network</div>
          <div class="network-wrap">
            <svg viewBox="0 0 ${W} ${H}" aria-hidden="true" style="overflow: visible;">
              <line x1="${cx}" y1="${cy}" x2="${l1x}" y2="${l1y}" ${edgeAttrs(lane1, p1.accent)} stroke-linecap="round"/>
              <line x1="${cx}" y1="${cy}" x2="${l2x}" y2="${l2y}" ${edgeAttrs(lane2, p2.accent)} stroke-linecap="round"/>

              <!-- Peer 1 -->
              <circle cx="${l1x}" cy="${l1y}" r="18" fill="#ffffff" stroke="${p1.accent}" stroke-width="2.5"/>
              <text x="${l1x}" y="${l1y + 4}" text-anchor="middle" font-family="DM Mono, monospace" font-size="12" font-weight="600" fill="#2a3326">${p1.id}</text>

              <!-- Peer 2 -->
              <circle cx="${l2x}" cy="${l2y}" r="18" fill="#ffffff" stroke="${p2.accent}" stroke-width="2.5"/>
              <text x="${l2x}" y="${l2y + 4}" text-anchor="middle" font-family="DM Mono, monospace" font-size="12" font-weight="600" fill="#2a3326">${p2.id}</text>

              <!-- Center (me) -->
              <circle cx="${cx}" cy="${cy}" r="24" fill="${me.accent}" stroke="#ffffff" stroke-width="3"/>
              <text x="${cx}" y="${cy + 5}" text-anchor="middle" font-family="DM Mono, monospace" font-size="14" font-weight="700" fill="#1f2a1c">${me.id}</text>
            </svg>

            <div class="node-label" style="left: ${(cx / W) * 100}%; top: ${(cy + 30) / H * 100}%;">${escapeHtml(me.displayName)}</div>
            <div class="node-label" style="left: ${(l1x / W) * 100}%; top: ${(l1y + 22) / H * 100}%;">${escapeHtml(p1.displayName)}</div>
            <div class="node-label" style="left: ${(l2x / W) * 100}%; top: ${(l2y + 22) / H * 100}%;">${escapeHtml(p2.displayName)}</div>

            <div class="edge-anchor" style="left: ${m1.left}; top: ${m1.top};">${edgeAnnotation(lane1)}</div>
            <div class="edge-anchor" style="left: ${m2.left}; top: ${m2.top};">${edgeAnnotation(lane2)}</div>
          </div>
        </div>
      `;
    }

    function buildSettlementsSection(kid) {
      const settles = settlementsForKitchen(kid);
      let body;
      if (!settles.length) {
        body = `<div class="empty">No settlements yet</div>`;
      } else {
        const shown = settles.slice(0, 3);
        body = shown.map(t => {
          const counterpartyId = t.sellerId === kid ? t.buyerId : t.sellerId;
          const counterparty = MOCK.kitchens[counterpartyId].displayName;
          const arrow = t.sellerId === kid ? "→" : "←";
          return `
            <div class="settle-row">
              <span class="ts">${relTime(t.agoSec)}</span>
              <span class="ing">${t.ingredient}</span>
              <span class="grow">${t.qtyKg} kg ${arrow} ${escapeHtml(counterparty)}</span>
              <span class="amount">${t.totalHbar.toFixed(2)} ℏ</span>
              <a class="hs-chip" href="${t.hashscanUrl}" target="_blank" rel="noopener">↗ HS</a>
            </div>
          `;
        }).join("");
      }
      return `
        <div class="section">
          <div class="label">Recent settlements</div>
          ${body}
        </div>
      `;
    }

    function buildPopupHTML(kid) {
      const k = MOCK.kitchens[kid];
      return `
        <div class="card">
          ${buildHeader(k)}
          ${buildOffersSection(kid)}
          ${buildNetworkSection(kid)}
          ${buildSettlementsSection(kid)}
        </div>
      `;
    }

    /* ===============================================================
       TRANSCRIPT DRAWER
       =============================================================== */
    function renderDrawer() {
      const el = document.getElementById("drawer-body");
      // Newest first.
      const ordered = MOCK.transcript.slice().sort((a, b) => a.agoSec - b.agoSec);
      el.innerHTML = ordered.map(entry => {
        const k = MOCK.kitchens[entry.kitchenId];
        return `
          <div class="thought-entry k-${entry.kitchenId}">
            <div class="ts-col">${relTime(entry.agoSec)}</div>
            <div class="body-col">
              <div class="who"><span class="dot"></span>${escapeHtml(k.displayName)} · ${escapeHtml(k.branch)}</div>
              <div class="thought">${escapeHtml(entry.thought)}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    /* ===============================================================
       MAP
       =============================================================== */
    // Token placeholder — same as app.html. To use the mockup standalone,
    // serve it through app-server.ts (which injects MAPBOX_TOKEN from env)
    // or replace this placeholder manually for local eyeballing.
    mapboxgl.accessToken = "__MAPBOX_TOKEN__";

    const map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/light-v11",
      center: [-0.095, 51.514],    // midpoint between the three London kitchens
      zoom: 12.8,
      attributionControl: true,
      cooperativeGestures: false
    });

    map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), "top-right");

    function buildPin(k) {
      // Active = has any trade in the last 300s. Mockup hardcodes: A & B active, C idle.
      const recentThreshold = 300;
      const isActive = MOCK.trades.some(t =>
        (t.sellerId === k.id || t.buyerId === k.id) && t.agoSec <= recentThreshold
      );
      const el = document.createElement("div");
      el.className = `pin k-${k.id}${isActive ? " active" : ""}`;
      el.innerHTML = `<span class="dot"></span><span class="name">${escapeHtml(k.displayName)}</span>`;
      return el;
    }

    map.on("load", () => {
      for (const k of Object.values(MOCK.kitchens)) {
        const el = buildPin(k);
        const popup = new mapboxgl.Popup({
          offset: 18,
          closeButton: true,
          closeOnClick: true,
          maxWidth: "380px"
        }).setHTML(buildPopupHTML(k.id));

        new mapboxgl.Marker({ element: el, anchor: "bottom" })
          .setLngLat([k.lng, k.lat])
          .setPopup(popup)
          .addTo(map);
      }
    });

    renderDrawer();
  </script>
</body>
</html>
