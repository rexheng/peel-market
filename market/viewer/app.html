<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Peel · Live · Three Kitchens on Hedera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--
    H8 Commit 3 — the live map viewer, served at GET / by app-server.ts.

    The initial draft (this commit) carries the same inline MOCK data as
    app-mockup.html so the route renders something immediately. C4 replaces
    the MOCK object with a /state poll + re-render loop so the page becomes
    genuinely live.

    MAPBOX_TOKEN is NOT hardcoded in this file. At request time,
    market/viewer/app-server.ts replaces the placeholder string below with
    process.env.MAPBOX_TOKEN. Keeping the token out of git means it rotates
    cleanly when rotated upstream.

    Privacy constraint (from the briefing — load-bearing):
      - NO per-kitchen inventory
      - NO HBAR balance
      - NO usage forecast
      - NO surplus calculation
    Only publicly broadcast envelopes (OFFER / PROPOSAL / TRADE_EXECUTED /
    REASONING) surface here. The H7 three-panel inventory view lives on
    /panels as a debugging surface — /state public response strips
    inventory so it can't be scraped either.
  -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>
  <style>
    /* --- Peel palette (OKLCH) — copied from H3/H7 for cross-surface
           coherence. Same variables, same kitchen-color mapping, so the
           console + three-panel + map surfaces all feel like one product. */
    :root {
      --paper:    oklch(97% 0.01 95);
      --paper-2:  oklch(95% 0.015 95);
      --paper-3:  oklch(92% 0.025 100);
      --ink:      oklch(25% 0.03 150);
      --ink-dim:  oklch(55% 0.02 150);
      --ink-mute: oklch(70% 0.015 145);
      --lime:     oklch(87% 0.18 120);
      --lime-dim: oklch(92% 0.12 120);
      --forest:   oklch(42% 0.14 145);
      --forest-2: oklch(32% 0.10 148);
      --coral:    oklch(70% 0.20 30);
      --coral-dim:oklch(82% 0.10 35);
      --border:   oklch(88% 0.015 95);
      --border-2: oklch(82% 0.02 100);
      /* Per-kitchen accents (hand-picked to match shared/hedera/kitchen-profiles.json) */
      --k-a: #A8D66B;
      --k-b: #F4A39A;
      --k-c: #5E8C6A;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      color: var(--ink);
      height: 100%;
    }
    body {
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.5;
      font-feature-settings: "ss01", "ss02", "tnum";
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .mono { font-family: "DM Mono", "SFMono-Regular", Menlo, monospace; }
    .serif { font-family: "Fraunces", Georgia, serif; }
    a { color: inherit; }

    /* ------------------------------------------------------------ */
    /*  Top bar                                                      */
    /* ------------------------------------------------------------ */
    header.topbar {
      padding: 18px 32px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      flex-shrink: 0;
      background: var(--paper);
      z-index: 10;
    }
    header.topbar .brand h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: 30px;
      margin: 0;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    header.topbar .brand .subtitle {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--forest);
      margin-top: 3px;
    }
    header.topbar .meta {
      font-family: "DM Mono", monospace;
      font-size: 11px;
      color: var(--ink-dim);
      text-align: right;
      letter-spacing: 0.04em;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
    }
    header.topbar .meta .live {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--forest);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 10px;
    }
    header.topbar .meta .live .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--lime);
      box-shadow: 0 0 0 0 var(--lime);
      animation: pulse 2.4s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 oklch(87% 0.18 120 / 0.6); }
      70%  { box-shadow: 0 0 0 9px oklch(87% 0.18 120 / 0); }
      100% { box-shadow: 0 0 0 0 oklch(87% 0.18 120 / 0); }
    }

    /* ------------------------------------------------------------ */
    /*  Map                                                          */
    /* ------------------------------------------------------------ */
    #map {
      flex: 0 0 65vh;
      width: 100%;
      background: var(--paper-2);
      position: relative;
    }
    /* Fade the top of the drawer into the map a little so the
       boundary isn't a hard line. */
    #map::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 24px;
      background: linear-gradient(to bottom, transparent, oklch(97% 0.01 95 / 0.7));
      pointer-events: none;
    }

    /* ------------------------------------------------------------ */
    /*  Kitchen pins (DOM-based custom markers)                      */
    /* ------------------------------------------------------------ */
    .pin {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 6px 8px;
      background: var(--paper);
      border: 1px solid var(--border-2);
      border-radius: 999px;
      box-shadow: 0 2px 8px oklch(25% 0.03 150 / 0.08),
                  0 1px 2px oklch(25% 0.03 150 / 0.06);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      font-family: "DM Sans", sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      user-select: none;
    }
    .pin:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px oklch(25% 0.03 150 / 0.14),
                  0 2px 4px oklch(25% 0.03 150 / 0.08);
    }
    .pin .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    /* Pulse when recent trade activity. Reused keyframe, tinted per accent. */
    .pin.active .dot {
      animation: pinpulse 1.8s ease-out infinite;
    }
    @keyframes pinpulse {
      0%   { box-shadow: 0 0 0 0 currentColor; }
      70%  { box-shadow: 0 0 0 8px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    .pin.k-A .dot { background: var(--k-a); color: var(--k-a); }
    .pin.k-B .dot { background: var(--k-b); color: var(--k-b); }
    .pin.k-C .dot { background: var(--k-c); color: var(--k-c); }

    /* ------------------------------------------------------------ */
    /*  Mapbox popup override                                        */
    /* ------------------------------------------------------------ */
    /* Mapbox defaults to overflow:hidden on the map container, which clips
       tall popups when a pin sits near the top of the map. Allowing visible
       overflow lets the popup escape the map area and sit over the drawer.
       The inner canvas still has its own clipping, so tiles don't leak. */
    .mapboxgl-map { overflow: visible !important; }
    .mapboxgl-popup { z-index: 20; }  /* sit above header + drawer */
    .mapboxgl-popup-content {
      padding: 0;
      border-radius: 14px;
      box-shadow: 0 10px 32px oklch(25% 0.03 150 / 0.16),
                  0 2px 6px oklch(25% 0.03 150 / 0.08);
      border: 1px solid var(--border-2);
      background: var(--paper);
      max-width: 380px;
      font-family: "DM Sans", sans-serif;
    }
    .mapboxgl-popup-close-button {
      font-size: 22px;
      padding: 6px 10px;
      color: var(--ink-dim);
    }
    .mapboxgl-popup-close-button:hover {
      background: transparent;
      color: var(--ink);
    }
    .mapboxgl-popup-tip {
      border-top-color: var(--paper) !important;
      border-bottom-color: var(--paper) !important;
    }

    /* ------------------------------------------------------------ */
    /*  Popup card                                                   */
    /* ------------------------------------------------------------ */
    .card { width: 360px; }
    .card .card-header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: flex-start;
    }
    .card .accent-pill {
      width: 4px;
      align-self: stretch;
      border-radius: 2px;
      min-height: 44px;
    }
    .card .card-header .name {
      font-family: "Fraunces", Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1.2;
    }
    .card .card-header .branch {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-dim);
      margin-top: 4px;
    }
    .card .card-header .tag {
      font-size: 12px;
      color: var(--ink-dim);
      margin-top: 5px;
      font-style: italic;
    }

    .card .section {
      padding: 14px 18px 14px;
      border-bottom: 1px solid var(--border);
    }
    .card .section:last-child { border-bottom: none; }
    .card .section .label {
      font-family: "DM Mono", monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-mute);
      margin-bottom: 8px;
    }

    .card .offer-row,
    .card .settle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-family: "DM Mono", monospace;
      font-size: 11px;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card .offer-row .ing,
    .card .settle-row .ing {
      color: var(--forest);
      background: var(--lime-dim);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
    }
    .card .offer-row .price,
    .card .settle-row .amount {
      color: var(--ink-dim);
    }
    .card .offer-row .grow,
    .card .settle-row .grow { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .card .settle-row .ts {
      color: var(--ink-mute);
      font-size: 10px;
    }
    .card .empty {
      font-family: "DM Sans", sans-serif;
      font-size: 12px;
      color: var(--ink-mute);
      font-style: italic;
    }
    .card .more {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      color: var(--ink-mute);
      padding-top: 3px;
    }

    /* Tiny HashScan chip — reused in list rows AND inside SVG overlay */
    .hs-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border: 1px solid var(--forest);
      border-radius: 4px;
      text-decoration: none;
      color: var(--forest);
      font-family: "DM Mono", monospace;
      font-size: 9px;
      background: var(--paper-2);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background 0.12s ease, transform 0.08s ease;
      flex-shrink: 0;
      line-height: 1;
    }
    .hs-chip:hover { background: var(--lime); transform: translateY(-1px); }

    /* ------------------------------------------------------------ */
    /*  Trade network SVG                                            */
    /* ------------------------------------------------------------ */
    .network-wrap {
      position: relative;
      display: block;
      margin: 4px auto 2px;
      width: 100%;
      max-width: 320px;
    }
    .network-wrap svg { display: block; width: 100%; height: auto; }
    .network-wrap .edge-anchor {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      pointer-events: none;  /* children re-enable */
    }
    .network-wrap .edge-anchor > * { pointer-events: auto; }
    .network-wrap .edge-label {
      background: var(--paper);
      border: 1px solid var(--border-2);
      border-radius: 11px;
      padding: 2px 8px;
      font-family: "DM Mono", monospace;
      font-size: 9px;
      color: var(--ink);
      white-space: nowrap;
      letter-spacing: 0.02em;
      box-shadow: 0 1px 3px oklch(25% 0.03 150 / 0.06);
    }
    .network-wrap .edge-label.dim {
      color: var(--ink-mute);
      border-style: dashed;
      background: transparent;
      font-style: italic;
    }
    .network-wrap .edge-anchor .hs-chip {
      padding: 1px 6px;
      font-size: 8px;
    }
    .network-wrap .node-label {
      position: absolute;
      transform: translate(-50%, 0);
      font-family: "DM Mono", monospace;
      font-size: 9px;
      color: var(--ink-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ------------------------------------------------------------ */
    /*  Transcript drawer                                            */
    /* ------------------------------------------------------------ */
    .drawer {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border);
      background: var(--paper-2);
    }
    .drawer-header {
      padding: 12px 32px;
      border-bottom: 1px solid var(--border);
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 32px 24px;
    }
    .drawer-body::-webkit-scrollbar { width: 8px; }
    .drawer-body::-webkit-scrollbar-track { background: transparent; }
    .drawer-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

    .thought-entry {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 18px;
      padding: 12px 0;
      border-bottom: 1px dashed var(--border);
      align-items: flex-start;
    }
    .thought-entry:last-child { border-bottom: none; }
    .thought-entry .ts-col {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      color: var(--ink-mute);
      padding-top: 4px;
      letter-spacing: 0.02em;
    }
    .thought-entry .body-col { min-width: 0; }
    .thought-entry .who {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-dim);
      margin-bottom: 4px;
    }
    .thought-entry .who .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .thought-entry.k-A .who .dot { background: var(--k-a); }
    .thought-entry.k-B .who .dot { background: var(--k-b); }
    .thought-entry.k-C .who .dot { background: var(--k-c); }
    .thought-entry .thought {
      font-family: "Fraunces", Georgia, serif;
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink);
      letter-spacing: -0.003em;
      max-width: 72ch;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Peel</h1>
      <div class="subtitle">live · three agents · testnet</div>
    </div>
    <div class="meta">
      <span class="live"><span class="dot"></span><span class="label">connecting</span></span>
      <span id="trades-today">· trades today</span>
      <span id="updated-time">updated —</span>
    </div>
  </header>

  <div id="map"></div>

  <section class="drawer">
    <div class="drawer-header">
      <span>Agent reasoning · transcript topic</span>
      <span>3 kitchens</span>
    </div>
    <div class="drawer-body" id="drawer-body">
      <!-- populated from MOCK.transcript -->
    </div>
  </section>

  <script>
    /* ===============================================================
       STATE — populated by pollState() from GET /state
       ===============================================================
       Shape expected from the server (market/viewer/app-server.ts):
         {
           updatedAt: "ISO string",
           pollCount: number,
           kitchenProfiles: { A: KitchenProfile, B: ..., C: ... },
           tradesSettledToday: number,
           trades: TradeRow[],        // OFFER/PROPOSAL/TRADE_EXECUTED/UNKNOWN
           transcript: TranscriptRow[],
           topics: { MARKET_TOPIC, TRANSCRIPT_TOPIC },
           error: string | null
         }
       /state is privacy-clean (no inventory, no balances, no forecast).
    */
    let STATE = {
      kitchenProfiles: { A: null, B: null, C: null },
      trades: [],
      transcript: [],
      tradesSettledToday: 0,
      updatedAt: null,
      error: null
    };

    // accountId → "A" | "B" | "C", rebuilt from kitchenProfiles on every
    // successful poll. Used for resolving envelopes whose kitchen field
    // only carries an account id.
    let ACCOUNT_TO_KID = {};
    function rebuildAccountMap() {
      ACCOUNT_TO_KID = {};
      for (const kid of ["A", "B", "C"]) {
        const p = STATE.kitchenProfiles[kid];
        if (p && p.accountId) ACCOUNT_TO_KID[p.accountId] = kid;
      }
    }

    /* ===============================================================
       DATA DERIVATIONS — all read from STATE
       =============================================================== */

    // "Open offers" for a kitchen = OFFER envelopes this kitchen published.
    // EXTEND: a true "open" filter drops offers that already have a matching
    //         TRADE_EXECUTED. That requires the server to surface offerId on
    //         OFFER rows (it doesn't yet). For the demo we show the N most
    //         recent OFFER envelopes from this kitchen regardless of
    //         settlement status — the popup caps the display at 3 rows
    //         anyway, so even a very chatty kitchen stays readable.
    function offersForKitchen(kid) {
      const profile = STATE.kitchenProfiles[kid];
      if (!profile) return [];
      return STATE.trades
        .filter(t => t.kind === "OFFER" && t.kitchenAccountId === profile.accountId)
        .slice()
        .sort((a, b) => b.seq - a.seq);
    }

    // Trades where this kitchen was seller OR buyer, newest first.
    function settlementsForKitchen(kid) {
      return STATE.trades
        .filter(t =>
          t.kind === "TRADE_EXECUTED" &&
          (t.sellerKitchenId === kid || t.buyerKitchenId === kid)
        )
        .slice()
        .sort((a, b) => b.seq - a.seq);
    }

    // Aggregate flow between `kid` and one peer, either direction.
    function laneFor(kid, peerId) {
      const lane = STATE.trades.filter(t =>
        t.kind === "TRADE_EXECUTED" &&
        ((t.sellerKitchenId === kid && t.buyerKitchenId === peerId) ||
         (t.sellerKitchenId === peerId && t.buyerKitchenId === kid))
      );
      if (!lane.length) return { count: 0, qtyKg: 0, totalHbar: 0, recent: null, ingredient: null };
      let qtyKg = 0, totalHbar = 0;
      for (const t of lane) { qtyKg += t.qtyKg; totalHbar += t.totalHbar; }
      const recent = lane.slice().sort((a, b) => b.seq - a.seq)[0];
      return {
        count: lane.length,
        qtyKg: Math.round(qtyKg * 10) / 10,
        totalHbar: Math.round(totalHbar * 10) / 10,
        ingredient: recent.ingredient,
        recent
      };
    }

    // Relative time from a mirror-node consensus_timestamp string
    // (e.g. "1775951724.607874504" seconds.nanos).
    function relTimeFromTs(consensusTimestamp) {
      const sec = parseFloat(consensusTimestamp);
      if (!Number.isFinite(sec)) return "";
      const ago = Math.max(0, Math.round((Date.now() - sec * 1000) / 1000));
      if (ago < 60) return `${ago}s ago`;
      if (ago < 3600) return `${Math.round(ago / 60)}m ago`;
      if (ago < 86400) return `${Math.round(ago / 3600)}h ago`;
      return `${Math.round(ago / 86400)}d ago`;
    }

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    /* ===============================================================
       POPUP CARD COMPOSITION
       =============================================================== */
    function buildHeader(k) {
      return `
        <div class="card-header">
          <div class="accent-pill" style="background: ${escapeHtml(k.accent)};"></div>
          <div>
            <div class="name serif">${escapeHtml(k.displayName)}</div>
            <div class="branch mono">${escapeHtml(k.branch.toUpperCase())} · ${escapeHtml(k.postcode)}</div>
            <div class="tag">${escapeHtml(k.tagline)}</div>
          </div>
        </div>
      `;
    }

    function buildOffersSection(kid) {
      const offers = offersForKitchen(kid);
      let body;
      if (!offers.length) {
        body = `<div class="empty">No open offers</div>`;
      } else {
        const shown = offers.slice(0, 3);
        const extra = offers.length - shown.length;
        body = shown.map(o => `
          <div class="offer-row">
            <span class="ing">${escapeHtml(o.ingredient)}</span>
            <span class="grow">${o.qtyKg} kg @ ${o.pricePerKgHbar.toFixed(2)} ℏ/kg</span>
            <a class="hs-chip" href="${escapeHtml(o.hashscanUrl)}" target="_blank" rel="noopener">↗ HS</a>
          </div>
        `).join("");
        if (extra > 0) body += `<div class="more">· +${extra} more</div>`;
      }
      return `
        <div class="section">
          <div class="label">Open offers</div>
          ${body}
        </div>
      `;
    }

    function buildNetworkSection(kid) {
      const me = STATE.kitchenProfiles[kid];
      if (!me) return "";
      const peerIds = ["A", "B", "C"].filter(id => id !== kid);
      const p1 = STATE.kitchenProfiles[peerIds[0]];
      const p2 = STATE.kitchenProfiles[peerIds[1]];
      if (!p1 || !p2) return "";
      const lane1 = laneFor(kid, peerIds[0]);
      const lane2 = laneFor(kid, peerIds[1]);

      // Viewbox / anchor math (unchanged from C2 mockup).
      const W = 320, H = 190;
      const cx = W / 2, cy = 42;               // center node (me) top-center
      const l1x = 50,  l1y = 142;              // peer 1 bottom-left
      const l2x = W - 50, l2y = 142;           // peer 2 bottom-right
      const T = 0.62;
      const mid1 = { x: cx + (l1x - cx) * T, y: cy + (l1y - cy) * T };
      const mid2 = { x: cx + (l2x - cx) * T, y: cy + (l2y - cy) * T };
      const toPct = (p) => ({ left: (p.x / W) * 100 + "%", top: (p.y / H) * 100 + "%" });
      const m1 = toPct(mid1), m2 = toPct(mid2);

      const anyTrades = lane1.count + lane2.count > 0;

      const edgeAttrs = (lane, peerAccent) => lane.count > 0
        ? `stroke="${peerAccent}" stroke-width="2.5"`
        : `stroke="#cbd0c8" stroke-width="1.5" stroke-dasharray="5 4"`;

      const edgeAnnotation = (lane) => {
        if (lane.count === 0) {
          return `<span class="edge-label dim">no trades yet</span>`;
        }
        const tradeWord = lane.count === 1 ? "trade" : "trades";
        return `
          <span class="edge-label">${lane.qtyKg} kg · ${lane.totalHbar.toFixed(1)} ℏ · ${lane.count} ${tradeWord}</span>
          <a class="hs-chip" href="${escapeHtml(lane.recent.hashscanUrl)}" target="_blank" rel="noopener">↗ HS</a>
        `;
      };

      if (!anyTrades) {
        return `
          <div class="section">
            <div class="label">Trade network</div>
            <div class="empty">No trades yet — agent is idle or scanning</div>
          </div>
        `;
      }

      return `
        <div class="section">
          <div class="label">Trade network</div>
          <div class="network-wrap">
            <svg viewBox="0 0 ${W} ${H}" aria-hidden="true" style="overflow: visible;">
              <line x1="${cx}" y1="${cy}" x2="${l1x}" y2="${l1y}" ${edgeAttrs(lane1, p1.accent)} stroke-linecap="round"/>
              <line x1="${cx}" y1="${cy}" x2="${l2x}" y2="${l2y}" ${edgeAttrs(lane2, p2.accent)} stroke-linecap="round"/>

              <!-- Peer 1 -->
              <circle cx="${l1x}" cy="${l1y}" r="18" fill="#ffffff" stroke="${p1.accent}" stroke-width="2.5"/>
              <text x="${l1x}" y="${l1y + 4}" text-anchor="middle" font-family="DM Mono, monospace" font-size="12" font-weight="600" fill="#2a3326">${peerIds[0]}</text>

              <!-- Peer 2 -->
              <circle cx="${l2x}" cy="${l2y}" r="18" fill="#ffffff" stroke="${p2.accent}" stroke-width="2.5"/>
              <text x="${l2x}" y="${l2y + 4}" text-anchor="middle" font-family="DM Mono, monospace" font-size="12" font-weight="600" fill="#2a3326">${peerIds[1]}</text>

              <!-- Center (me) -->
              <circle cx="${cx}" cy="${cy}" r="24" fill="${me.accent}" stroke="#ffffff" stroke-width="3"/>
              <text x="${cx}" y="${cy + 5}" text-anchor="middle" font-family="DM Mono, monospace" font-size="14" font-weight="700" fill="#1f2a1c">${kid}</text>
            </svg>

            <div class="node-label" style="left: ${(cx / W) * 100}%; top: ${(cy + 30) / H * 100}%;">${escapeHtml(me.displayName)}</div>
            <div class="node-label" style="left: ${(l1x / W) * 100}%; top: ${(l1y + 22) / H * 100}%;">${escapeHtml(p1.displayName)}</div>
            <div class="node-label" style="left: ${(l2x / W) * 100}%; top: ${(l2y + 22) / H * 100}%;">${escapeHtml(p2.displayName)}</div>

            <div class="edge-anchor" style="left: ${m1.left}; top: ${m1.top};">${edgeAnnotation(lane1)}</div>
            <div class="edge-anchor" style="left: ${m2.left}; top: ${m2.top};">${edgeAnnotation(lane2)}</div>
          </div>
        </div>
      `;
    }

    function buildSettlementsSection(kid) {
      const settles = settlementsForKitchen(kid);
      let body;
      if (!settles.length) {
        body = `<div class="empty">No settlements yet</div>`;
      } else {
        const shown = settles.slice(0, 3);
        body = shown.map(t => {
          const counterpartyId = t.sellerKitchenId === kid ? t.buyerKitchenId : t.sellerKitchenId;
          const counterpartyProfile = counterpartyId ? STATE.kitchenProfiles[counterpartyId] : null;
          const counterpartyName = counterpartyProfile ? counterpartyProfile.displayName : "unknown";
          const arrow = t.sellerKitchenId === kid ? "→" : "←";
          return `
            <div class="settle-row">
              <span class="ts">${relTimeFromTs(t.consensusTimestamp)}</span>
              <span class="ing">${escapeHtml(t.ingredient)}</span>
              <span class="grow">${t.qtyKg} kg ${arrow} ${escapeHtml(counterpartyName)}</span>
              <span class="amount">${t.totalHbar.toFixed(2)} ℏ</span>
              <a class="hs-chip" href="${escapeHtml(t.hashscanUrl)}" target="_blank" rel="noopener">↗ HS</a>
            </div>
          `;
        }).join("");
      }
      return `
        <div class="section">
          <div class="label">Recent settlements</div>
          ${body}
        </div>
      `;
    }

    function buildPopupHTML(kid) {
      const k = STATE.kitchenProfiles[kid];
      if (!k) {
        return `<div class="card"><div class="card-header"><div>Loading…</div></div></div>`;
      }
      return `
        <div class="card">
          ${buildHeader(k)}
          ${buildOffersSection(kid)}
          ${buildNetworkSection(kid)}
          ${buildSettlementsSection(kid)}
        </div>
      `;
    }

    /* ===============================================================
       TRANSCRIPT DRAWER
       =============================================================== */
    function renderDrawer() {
      const el = document.getElementById("drawer-body");
      if (!el) return;
      // Newest first. Server returns transcript in consensus order (asc)
      // so we sort by seq DESC to put the latest thought at the top.
      const ordered = STATE.transcript.slice().sort((a, b) => b.seq - a.seq);
      if (!ordered.length) {
        el.innerHTML = `<div style="color: var(--ink-mute); font-style: italic; padding: 18px 0;">No reasoning published yet — agents are booting or idle</div>`;
        return;
      }
      el.innerHTML = ordered.map(entry => {
        const kid = entry.kitchenId;
        const profile = kid ? STATE.kitchenProfiles[kid] : null;
        const ts = relTimeFromTs(entry.consensusTimestamp);
        if (!profile) {
          return `
            <div class="thought-entry">
              <div class="ts-col">${ts}</div>
              <div class="body-col">
                <div class="who"><span class="dot" style="background: var(--ink-mute);"></span>unknown kitchen</div>
                <div class="thought">${escapeHtml(entry.thought)}</div>
              </div>
            </div>
          `;
        }
        return `
          <div class="thought-entry k-${kid}">
            <div class="ts-col">${ts}</div>
            <div class="body-col">
              <div class="who"><span class="dot"></span>${escapeHtml(profile.displayName)} · ${escapeHtml(profile.branch)}</div>
              <div class="thought">${escapeHtml(entry.thought)}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    /* ===============================================================
       TOPBAR
       =============================================================== */
    function renderTopbar() {
      const n = STATE.tradesSettledToday ?? 0;
      const tradesEl = document.getElementById("trades-today");
      if (tradesEl) tradesEl.textContent = `${n} trade${n === 1 ? "" : "s"} settled today`;

      const updatedEl = document.getElementById("updated-time");
      if (updatedEl && STATE.updatedAt) {
        const dt = new Date(STATE.updatedAt);
        const hh = String(dt.getUTCHours()).padStart(2, "0");
        const mm = String(dt.getUTCMinutes()).padStart(2, "0");
        const ss = String(dt.getUTCSeconds()).padStart(2, "0");
        updatedEl.textContent = `updated ${hh}:${mm}:${ss} UTC`;
      }

      // Flip the live dot to coral when /state fetches fail. Keep last
      // snapshot visible — we just change the indicator so it's obvious
      // the data is stale.
      const dot = document.querySelector("header.topbar .meta .live .dot");
      const liveLabel = document.querySelector("header.topbar .meta .live .label");
      if (dot && liveLabel) {
        if (STATE.error) {
          dot.style.background = "var(--coral)";
          dot.style.animation = "none";
          liveLabel.textContent = "offline";
        } else {
          dot.style.background = "";
          dot.style.animation = "";
          liveLabel.textContent = "live";
        }
      }
    }

    /* ===============================================================
       MAP + PINS
       =============================================================== */
    // Token placeholder — app-server.ts replaces the string literal below
    // with process.env.MAPBOX_TOKEN at request time so the token is never
    // committed to git.
    mapboxgl.accessToken = "__MAPBOX_TOKEN__";

    const map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/light-v11",
      center: [-0.095, 51.514],    // midpoint between the three London kitchens
      zoom: 12.8,
      attributionControl: true,
      cooperativeGestures: false
    });
    map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), "top-right");

    const markers = { A: null, B: null, C: null };
    const popups = { A: null, B: null, C: null };

    function buildPin(profile, kid) {
      const el = document.createElement("div");
      el.className = `pin k-${kid}`;
      el.innerHTML = `<span class="dot"></span><span class="name">${escapeHtml(profile.displayName)}</span>`;
      return el;
    }

    // Create markers exactly once, after the first /state has populated
    // kitchenProfiles. Subsequent polls only refresh popup HTML + pin
    // activity state.
    function ensureMarkers() {
      if (markers.A && markers.B && markers.C) return;
      for (const kid of ["A", "B", "C"]) {
        if (markers[kid]) continue;
        const profile = STATE.kitchenProfiles[kid];
        if (!profile) continue;
        const el = buildPin(profile, kid);
        const popup = new mapboxgl.Popup({
          offset: 18,
          closeButton: true,
          closeOnClick: true,
          maxWidth: "380px"
        }).setHTML(buildPopupHTML(kid));
        const marker = new mapboxgl.Marker({ element: el, anchor: "bottom" })
          .setLngLat([profile.lng, profile.lat])
          .setPopup(popup)
          .addTo(map);
        markers[kid] = marker;
        popups[kid] = popup;
      }
    }

    // Pulse a pin when the kitchen participated in a trade within the last
    // 5 minutes. Purely visual — drives the .active class on the pin DOM.
    function refreshMarkerActivity() {
      const nowMs = Date.now();
      const WINDOW_MS = 5 * 60 * 1000;
      for (const kid of ["A", "B", "C"]) {
        const marker = markers[kid];
        if (!marker) continue;
        const el = marker.getElement();
        const hasRecent = STATE.trades.some(t => {
          if (t.kind !== "TRADE_EXECUTED") return false;
          if (t.sellerKitchenId !== kid && t.buyerKitchenId !== kid) return false;
          const sec = parseFloat(t.consensusTimestamp);
          return Number.isFinite(sec) && nowMs - sec * 1000 < WINDOW_MS;
        });
        el.classList.toggle("active", hasRecent);
      }
    }

    // Refresh popup HTML in place. Mapbox's Popup.setHTML updates the
    // already-open popup DOM if one is open, and is used as the content
    // on the next click if the popup is closed. Either way, the view
    // stays fresh against the latest /state without us tearing down and
    // recreating the popup object.
    function refreshAllPopups() {
      for (const kid of ["A", "B", "C"]) {
        const popup = popups[kid];
        if (popup) popup.setHTML(buildPopupHTML(kid));
      }
    }

    /* ===============================================================
       POLL LOOP — GET /state every 3s
       =============================================================== */
    const POLL_INTERVAL_MS = 3000;

    async function pollState() {
      try {
        const resp = await fetch("/state", { cache: "no-store" });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const next = await resp.json();
        STATE = Object.assign({}, STATE, next, { error: null });
        rebuildAccountMap();
        ensureMarkers();
        renderTopbar();
        renderDrawer();
        refreshMarkerActivity();
        refreshAllPopups();
      } catch (err) {
        const msg = err instanceof Error ? err.message : String(err);
        console.error("[h8] /state poll failed:", msg);
        STATE = Object.assign({}, STATE, { error: msg });
        renderTopbar();
        // Don't clobber the drawer / markers on failure — keep the last
        // good snapshot visible and just flip the status indicator.
      }
    }

    // Kick off after the map has finished its first render so marker
    // creation has a valid map to attach to. Then poll on a 3s interval.
    map.on("load", () => {
      void pollState();
      setInterval(() => { void pollState(); }, POLL_INTERVAL_MS);
    });
  </script>
</body>
</html>
