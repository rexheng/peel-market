<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Peel · Live Exchange · Hedera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--
    H8 Commit 3 — the live map viewer, served at GET / by app-server.ts.

    The initial draft (this commit) carries the same inline MOCK data as
    app-mockup.html so the route renders something immediately. C4 replaces
    the MOCK object with a /state poll + re-render loop so the page becomes
    genuinely live.

    MAPBOX_TOKEN is NOT hardcoded in this file. At request time,
    market/viewer/app-server.ts replaces the placeholder string below with
    process.env.MAPBOX_TOKEN. Keeping the token out of git means it rotates
    cleanly when rotated upstream.

    Privacy constraint (from the briefing — load-bearing):
      - NO per-kitchen inventory
      - NO HBAR balance
      - NO usage forecast
      - NO surplus calculation
    Only publicly broadcast envelopes (OFFER / PROPOSAL / TRADE_EXECUTED /
    REASONING) surface here. The H7 three-panel inventory view lives on
    /panels as a debugging surface — /state public response strips
    inventory so it can't be scraped either.
  -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>
  <style>
    /* --- Peel palette (OKLCH) — copied from H3/H7 for cross-surface
           coherence. Same variables, same kitchen-color mapping, so the
           console + three-panel + map surfaces all feel like one product. */
    :root {
      --paper:    oklch(97% 0.01 95);
      --paper-2:  oklch(95% 0.015 95);
      --paper-3:  oklch(92% 0.025 100);
      --ink:      oklch(25% 0.03 150);
      --ink-dim:  oklch(55% 0.02 150);
      --ink-mute: oklch(70% 0.015 145);
      --lime:     oklch(87% 0.18 120);
      --lime-dim: oklch(92% 0.12 120);
      --forest:   oklch(42% 0.14 145);
      --forest-2: oklch(32% 0.10 148);
      --coral:    oklch(70% 0.20 30);
      --coral-dim:oklch(82% 0.10 35);
      --border:   oklch(88% 0.015 95);
      --border-2: oklch(82% 0.02 100);
      /* Per-kitchen accents (hand-picked to match shared/hedera/kitchen-profiles.json) */
      --k-a: #A8D66B;
      --k-b: #F4A39A;
      --k-c: #5E8C6A;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      color: var(--ink);
      height: 100%;
    }
    body {
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.5;
      font-feature-settings: "ss01", "ss02", "tnum";
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .mono { font-family: "DM Mono", "SFMono-Regular", Menlo, monospace; }
    .serif { font-family: "Fraunces", Georgia, serif; }
    a { color: inherit; }

    /* ------------------------------------------------------------ */
    /*  Top bar                                                      */
    /* ------------------------------------------------------------ */
    header.topbar {
      padding: 18px 32px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      flex-shrink: 0;
      background: var(--paper);
      z-index: 10;
    }
    header.topbar .brand h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: 30px;
      margin: 0;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    header.topbar .brand .subtitle {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--forest);
      margin-top: 3px;
    }
    header.topbar .meta {
      font-family: "DM Mono", monospace;
      font-size: 11px;
      color: var(--ink-dim);
      text-align: right;
      letter-spacing: 0.04em;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
    }
    header.topbar .meta .live {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--forest);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 10px;
    }
    header.topbar .meta .live .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--lime);
      box-shadow: 0 0 0 0 var(--lime);
      animation: pulse 2.4s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 oklch(87% 0.18 120 / 0.6); }
      70%  { box-shadow: 0 0 0 9px oklch(87% 0.18 120 / 0); }
      100% { box-shadow: 0 0 0 0 oklch(87% 0.18 120 / 0); }
    }

    /* ------------------------------------------------------------ */
    /*  Map                                                          */
    /* ------------------------------------------------------------ */
    #map {
      flex: 0 0 clamp(300px, 55vh, 600px);
      width: 100%;
      background: var(--paper-2);
      position: relative;
    }
    /* Fade the top of the drawer into the map a little so the
       boundary isn't a hard line. */
    #map::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 24px;
      background: linear-gradient(to bottom, transparent, oklch(97% 0.01 95 / 0.7));
      pointer-events: none;
    }

    /* ------------------------------------------------------------ */
    /*  Kitchen pins — now native Mapbox layers, CSS only for popups */
    /* ------------------------------------------------------------ */
    /* DOM pins removed — all markers are GPU-rendered via Mapbox
       addSource/addLayer (circle + symbol). Zero zoom lag. */

    /* ------------------------------------------------------------ */
    /*  Mapbox popup override                                        */
    /* ------------------------------------------------------------ */
    /* Mapbox defaults to overflow:hidden on the map container, which clips
       tall popups when a pin sits near the top of the map. Allowing visible
       overflow lets the popup escape the map area and sit over the drawer.
       The inner canvas still has its own clipping, so tiles don't leak. */
    .mapboxgl-map { overflow: visible !important; }
    .mapboxgl-popup { z-index: 20; }  /* sit above header + drawer */
    .mapboxgl-popup-content {
      padding: 0;
      border-radius: 14px;
      box-shadow: 0 10px 32px oklch(25% 0.03 150 / 0.16),
                  0 2px 6px oklch(25% 0.03 150 / 0.08);
      border: 1px solid var(--border-2);
      background: var(--paper);
      max-width: 380px;
      font-family: "DM Sans", sans-serif;
    }
    .mapboxgl-popup-close-button {
      font-size: 22px;
      padding: 6px 10px;
      color: var(--ink-dim);
    }
    .mapboxgl-popup-close-button:hover {
      background: transparent;
      color: var(--ink);
    }
    .mapboxgl-popup-tip {
      border-top-color: var(--paper) !important;
      border-bottom-color: var(--paper) !important;
    }

    /* ------------------------------------------------------------ */
    /*  Popup card                                                   */
    /* ------------------------------------------------------------ */
    .card { width: 360px; }
    .card .card-header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: flex-start;
    }
    .card .accent-pill {
      width: 4px;
      align-self: stretch;
      border-radius: 2px;
      min-height: 44px;
    }
    .card .card-header .name {
      font-family: "Fraunces", Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1.2;
    }
    .card .card-header .branch {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-dim);
      margin-top: 4px;
    }
    .card .card-header .tag {
      font-size: 12px;
      color: var(--ink-dim);
      margin-top: 5px;
      font-style: italic;
    }

    .card .section {
      padding: 14px 18px 14px;
      border-bottom: 1px solid var(--border);
    }
    .card .section:last-child { border-bottom: none; }
    .card .section .label {
      font-family: "DM Mono", monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-mute);
      margin-bottom: 8px;
    }

    .card .offer-row,
    .card .settle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-family: "DM Mono", monospace;
      font-size: 11px;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card .offer-row .ing,
    .card .settle-row .ing {
      color: var(--forest);
      background: var(--lime-dim);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
    }
    .card .offer-row .price,
    .card .settle-row .amount {
      color: var(--ink-dim);
    }
    .card .offer-row .grow,
    .card .settle-row .grow { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .card .settle-row .ts {
      color: var(--ink-mute);
      font-size: 10px;
    }
    .card .empty {
      font-family: "DM Sans", sans-serif;
      font-size: 12px;
      color: var(--ink-mute);
      font-style: italic;
    }
    .card .more {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      color: var(--ink-mute);
      padding-top: 3px;
    }

    /* Tiny HashScan chip — reused in list rows AND inside SVG overlay */
    .hs-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border: 1px solid var(--forest);
      border-radius: 4px;
      text-decoration: none;
      color: var(--forest);
      font-family: "DM Mono", monospace;
      font-size: 9px;
      background: var(--paper-2);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background 0.12s ease, transform 0.08s ease;
      flex-shrink: 0;
      line-height: 1;
    }
    .hs-chip:hover { background: var(--lime); transform: translateY(-1px); }

    /* ------------------------------------------------------------ */
    /*  Trade network SVG                                            */
    /* ------------------------------------------------------------ */
    .network-wrap {
      position: relative;
      display: block;
      margin: 4px auto 2px;
      width: 100%;
      max-width: 320px;
    }
    .network-wrap svg { display: block; width: 100%; height: auto; }
    .network-wrap .edge-anchor {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      pointer-events: none;  /* children re-enable */
    }
    .network-wrap .edge-anchor > * { pointer-events: auto; }
    .network-wrap .edge-label {
      background: var(--paper);
      border: 1px solid var(--border-2);
      border-radius: 11px;
      padding: 2px 8px;
      font-family: "DM Mono", monospace;
      font-size: 9px;
      color: var(--ink);
      white-space: nowrap;
      letter-spacing: 0.02em;
      box-shadow: 0 1px 3px oklch(25% 0.03 150 / 0.06);
    }
    .network-wrap .edge-label.dim {
      color: var(--ink-mute);
      border-style: dashed;
      background: transparent;
      font-style: italic;
    }
    .network-wrap .edge-anchor .hs-chip {
      padding: 1px 6px;
      font-size: 8px;
    }
    .network-wrap .node-label {
      position: absolute;
      transform: translate(-50%, 0);
      font-family: "DM Mono", monospace;
      font-size: 9px;
      color: var(--ink-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      pointer-events: none;
    }

    /* Peripheral + trade arc styles removed — now native Mapbox layers */

    /* ------------------------------------------------------------ */
    /*  Activity feed entries (replaces plain transcript)             */
    /* ------------------------------------------------------------ */
    .activity-entry {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px dashed var(--border);
      align-items: flex-start;
    }
    .activity-entry:last-child { border-bottom: none; }
    .activity-entry .ts-col {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      color: var(--ink-mute);
      padding-top: 3px;
      letter-spacing: 0.02em;
    }
    .activity-entry .body-col { min-width: 0; }
    .activity-entry .who {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-dim);
      margin-bottom: 3px;
    }
    .activity-entry .who .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .activity-entry.k-A .who .dot { background: var(--k-a); }
    .activity-entry.k-B .who .dot { background: var(--k-b); }
    .activity-entry.k-C .who .dot { background: var(--k-c); }
    .activity-entry .action {
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      line-height: 1.45;
      color: var(--ink);
    }
    .activity-entry .action .ingredient {
      font-family: "DM Mono", monospace;
      font-size: 12px;
      color: var(--forest);
      background: var(--lime-dim);
      padding: 1px 6px;
      border-radius: 3px;
    }
    .activity-entry .action .amount {
      font-family: "DM Mono", monospace;
      font-weight: 500;
    }
    .activity-entry .action .arrow {
      color: var(--ink-dim);
      margin: 0 2px;
    }
    .activity-entry .action .counterparty {
      font-weight: 500;
    }
    .activity-entry.kind-TRADE_EXECUTED .action {
      color: var(--forest-2);
      font-weight: 500;
    }
    .activity-entry.kind-REASONING .action {
      font-family: "Fraunces", Georgia, serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink-dim);
      font-style: italic;
      max-width: 72ch;
    }
    .activity-entry .meta-row {
      margin-top: 4px;
    }

    /* ------------------------------------------------------------ */
    /*  Main layout: sidebar + content                               */
    /* ------------------------------------------------------------ */
    .main-layout {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--paper);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      font-family: "DM Mono", monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-mute);
    }
    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .sidebar-body::-webkit-scrollbar { width: 6px; }
    .sidebar-body::-webkit-scrollbar-track { background: transparent; }
    .sidebar-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

    .sidebar-section-label {
      padding: 14px 20px 6px;
      font-family: "DM Mono", monospace;
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--ink-mute);
    }

    .kitchen-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.12s ease;
      border-left: 3px solid transparent;
    }
    .kitchen-item:hover { background: var(--paper-2); }
    .kitchen-item.active { border-left-color: var(--lime); background: var(--paper-2); }
    .kitchen-item .k-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .kitchen-item.active .k-dot {
      box-shadow: 0 0 0 3px var(--paper), 0 0 0 5px currentColor;
    }
    .kitchen-item .k-info { min-width: 0; flex: 1; }
    .kitchen-item .k-name {
      font-family: "DM Sans", sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .kitchen-item .k-branch {
      font-family: "DM Mono", monospace;
      font-size: 9px;
      color: var(--ink-mute);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .kitchen-item .k-status {
      font-family: "DM Mono", monospace;
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      flex-shrink: 0;
    }
    .kitchen-item .k-status.live { color: var(--forest); }
    .kitchen-item .k-status.pending { color: var(--ink-mute); }

    .content-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    /* ------------------------------------------------------------ */
    /*  Transcript drawer                                            */
    /* ------------------------------------------------------------ */
    .drawer {
      flex: 1;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border);
      background: var(--paper-2);
    }
    .drawer-header {
      padding: 12px 32px;
      border-bottom: 1px solid var(--border);
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 32px 24px;
    }
    .drawer-body::-webkit-scrollbar { width: 8px; }
    .drawer-body::-webkit-scrollbar-track { background: transparent; }
    .drawer-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

    .thought-entry {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 18px;
      padding: 12px 0;
      border-bottom: 1px dashed var(--border);
      align-items: flex-start;
    }
    .thought-entry:last-child { border-bottom: none; }
    .thought-entry .ts-col {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      color: var(--ink-mute);
      padding-top: 4px;
      letter-spacing: 0.02em;
    }
    .thought-entry .body-col { min-width: 0; }
    .thought-entry .who {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-dim);
      margin-bottom: 4px;
    }
    .thought-entry .who .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .thought-entry.k-A .who .dot { background: var(--k-a); }
    .thought-entry.k-B .who .dot { background: var(--k-b); }
    .thought-entry.k-C .who .dot { background: var(--k-c); }
    .thought-entry .thought {
      font-family: "Fraunces", Georgia, serif;
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink);
      letter-spacing: -0.003em;
      max-width: 72ch;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" style="text-decoration:none;color:inherit;">
      <h1>Peel</h1>
      <div class="subtitle">live · food credit exchange · testnet</div>
    </a>
    <div class="meta">
      <span class="live"><span class="dot"></span><span class="label">connecting</span></span>
      <span id="trades-today">· trades today</span>
      <span id="updated-time">updated —</span>
    </div>
  </header>

  <div class="main-layout">
    <aside class="sidebar">
      <div class="sidebar-header">Kitchens on Peel</div>
      <div class="sidebar-body" id="sidebar-body">
        <!-- populated by renderSidebar() -->
      </div>
    </aside>
    <div class="content-col">
      <div id="map"></div>
      <section class="drawer">
        <div class="drawer-header">
          <span>Activity feed · live exchange</span>
          <span id="active-count">3 active kitchens</span>
        </div>
        <div class="drawer-body" id="drawer-body">
          <!-- populated from /state + simulation -->
        </div>
      </section>
    </div>
  </div>

  <script>
    /* ===============================================================
       STATE — populated by pollState() from GET /state
       ===============================================================
       Shape expected from the server (market/viewer/app-server.ts):
         {
           updatedAt: "ISO string",
           pollCount: number,
           kitchenProfiles: { A: KitchenProfile, B: ..., C: ... },
           tradesSettledToday: number,
           trades: TradeRow[],        // OFFER/PROPOSAL/TRADE_EXECUTED/UNKNOWN
           transcript: TranscriptRow[],
           topics: { MARKET_TOPIC, TRANSCRIPT_TOPIC },
           error: string | null
         }
       /state is privacy-clean (no inventory, no balances, no forecast).
    */
    let STATE = {
      kitchenProfiles: { A: null, B: null, C: null },
      trades: [],
      transcript: [],
      tradesSettledToday: 0,
      updatedAt: null,
      error: null
    };

    // accountId → "A" | "B" | "C", rebuilt from kitchenProfiles on every
    // successful poll. Used for resolving envelopes whose kitchen field
    // only carries an account id.
    let ACCOUNT_TO_KID = {};
    function rebuildAccountMap() {
      ACCOUNT_TO_KID = {};
      for (const kid of ["A", "B", "C"]) {
        const p = STATE.kitchenProfiles[kid];
        if (p && p.accountId) ACCOUNT_TO_KID[p.accountId] = kid;
      }
    }

    /* ===============================================================
       DATA DERIVATIONS — all read from STATE
       =============================================================== */

    // "Open offers" for a kitchen = OFFER envelopes this kitchen published.
    // EXTEND: a true "open" filter drops offers that already have a matching
    //         TRADE_EXECUTED. That requires the server to surface offerId on
    //         OFFER rows (it doesn't yet). For the demo we show the N most
    //         recent OFFER envelopes from this kitchen regardless of
    //         settlement status — the popup caps the display at 3 rows
    //         anyway, so even a very chatty kitchen stays readable.
    function offersForKitchen(kid) {
      const profile = STATE.kitchenProfiles[kid];
      if (!profile) return [];
      return STATE.trades
        .filter(t => t.kind === "OFFER" && t.kitchenAccountId === profile.accountId)
        .slice()
        .sort((a, b) => b.seq - a.seq);
    }

    // Trades where this kitchen was seller OR buyer, newest first.
    function settlementsForKitchen(kid) {
      return STATE.trades
        .filter(t =>
          t.kind === "TRADE_EXECUTED" &&
          (t.sellerKitchenId === kid || t.buyerKitchenId === kid)
        )
        .slice()
        .sort((a, b) => b.seq - a.seq);
    }

    // Aggregate flow between `kid` and one peer, either direction.
    function laneFor(kid, peerId) {
      const lane = STATE.trades.filter(t =>
        t.kind === "TRADE_EXECUTED" &&
        ((t.sellerKitchenId === kid && t.buyerKitchenId === peerId) ||
         (t.sellerKitchenId === peerId && t.buyerKitchenId === kid))
      );
      if (!lane.length) return { count: 0, qtyKg: 0, totalHbar: 0, recent: null, ingredient: null };
      let qtyKg = 0, totalHbar = 0;
      for (const t of lane) { qtyKg += t.qtyKg; totalHbar += t.totalHbar; }
      const recent = lane.slice().sort((a, b) => b.seq - a.seq)[0];
      return {
        count: lane.length,
        qtyKg: Math.round(qtyKg * 10) / 10,
        totalHbar: Math.round(totalHbar * 10) / 10,
        ingredient: recent.ingredient,
        recent
      };
    }

    // Relative time from a mirror-node consensus_timestamp string
    // (e.g. "1775951724.607874504" seconds.nanos).
    function relTimeFromTs(consensusTimestamp) {
      const sec = parseFloat(consensusTimestamp);
      if (!Number.isFinite(sec)) return "";
      const ago = Math.max(0, Math.round((Date.now() - sec * 1000) / 1000));
      if (ago < 60) return `${ago}s ago`;
      if (ago < 3600) return `${Math.round(ago / 60)}m ago`;
      if (ago < 86400) return `${Math.round(ago / 3600)}h ago`;
      return `${Math.round(ago / 86400)}d ago`;
    }

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    /* ===============================================================
       POPUP CARD COMPOSITION
       =============================================================== */
    function buildHeader(k) {
      return `
        <div class="card-header">
          <div class="accent-pill" style="background: ${escapeHtml(k.accent)};"></div>
          <div>
            <div class="name serif">${escapeHtml(k.displayName)}</div>
            <div class="branch mono">${escapeHtml(k.branch.toUpperCase())} · ${escapeHtml(k.postcode)}</div>
            <div class="tag">${escapeHtml(k.tagline)}</div>
          </div>
        </div>
      `;
    }

    function buildOffersSection(kid) {
      const offers = offersForKitchen(kid);
      let body;
      if (!offers.length) {
        body = `<div class="empty">No open offers</div>`;
      } else {
        const shown = offers.slice(0, 3);
        const extra = offers.length - shown.length;
        body = shown.map(o => `
          <div class="offer-row">
            <span class="ing">${escapeHtml(o.ingredient)}</span>
            <span class="grow">${o.qtyKg} kg @ ${o.pricePerKgHbar.toFixed(2)} ℏ/kg</span>
            <a class="hs-chip" href="${escapeHtml(o.hashscanUrl)}" target="_blank" rel="noopener">↗ HS</a>
          </div>
        `).join("");
        if (extra > 0) body += `<div class="more">· +${extra} more</div>`;
      }
      return `
        <div class="section">
          <div class="label">Open offers</div>
          ${body}
        </div>
      `;
    }

    function buildNetworkSection(kid) {
      const me = STATE.kitchenProfiles[kid];
      if (!me) return "";
      const peerIds = ["A", "B", "C"].filter(id => id !== kid);
      const p1 = STATE.kitchenProfiles[peerIds[0]];
      const p2 = STATE.kitchenProfiles[peerIds[1]];
      if (!p1 || !p2) return "";
      const lane1 = laneFor(kid, peerIds[0]);
      const lane2 = laneFor(kid, peerIds[1]);

      // Viewbox / anchor math (unchanged from C2 mockup).
      const W = 320, H = 190;
      const cx = W / 2, cy = 42;               // center node (me) top-center
      const l1x = 50,  l1y = 142;              // peer 1 bottom-left
      const l2x = W - 50, l2y = 142;           // peer 2 bottom-right
      const T = 0.62;
      const mid1 = { x: cx + (l1x - cx) * T, y: cy + (l1y - cy) * T };
      const mid2 = { x: cx + (l2x - cx) * T, y: cy + (l2y - cy) * T };
      const toPct = (p) => ({ left: (p.x / W) * 100 + "%", top: (p.y / H) * 100 + "%" });
      const m1 = toPct(mid1), m2 = toPct(mid2);

      const anyTrades = lane1.count + lane2.count > 0;

      const edgeAttrs = (lane, peerAccent) => lane.count > 0
        ? `stroke="${peerAccent}" stroke-width="2.5"`
        : `stroke="#cbd0c8" stroke-width="1.5" stroke-dasharray="5 4"`;

      const edgeAnnotation = (lane) => {
        if (lane.count === 0) {
          return `<span class="edge-label dim">no trades yet</span>`;
        }
        const tradeWord = lane.count === 1 ? "trade" : "trades";
        return `
          <span class="edge-label">${lane.qtyKg} kg · ${lane.totalHbar.toFixed(1)} ℏ · ${lane.count} ${tradeWord}</span>
          <a class="hs-chip" href="${escapeHtml(lane.recent.hashscanUrl)}" target="_blank" rel="noopener">↗ HS</a>
        `;
      };

      if (!anyTrades) {
        return `
          <div class="section">
            <div class="label">Trade network</div>
            <div class="empty">No trades yet — agent is idle or scanning</div>
          </div>
        `;
      }

      return `
        <div class="section">
          <div class="label">Trade network</div>
          <div class="network-wrap">
            <svg viewBox="0 0 ${W} ${H}" aria-hidden="true" style="overflow: visible;">
              <line x1="${cx}" y1="${cy}" x2="${l1x}" y2="${l1y}" ${edgeAttrs(lane1, p1.accent)} stroke-linecap="round"/>
              <line x1="${cx}" y1="${cy}" x2="${l2x}" y2="${l2y}" ${edgeAttrs(lane2, p2.accent)} stroke-linecap="round"/>

              <!-- Peer 1 -->
              <circle cx="${l1x}" cy="${l1y}" r="18" fill="#ffffff" stroke="${p1.accent}" stroke-width="2.5"/>
              <text x="${l1x}" y="${l1y + 4}" text-anchor="middle" font-family="DM Mono, monospace" font-size="12" font-weight="600" fill="#2a3326">${peerIds[0]}</text>

              <!-- Peer 2 -->
              <circle cx="${l2x}" cy="${l2y}" r="18" fill="#ffffff" stroke="${p2.accent}" stroke-width="2.5"/>
              <text x="${l2x}" y="${l2y + 4}" text-anchor="middle" font-family="DM Mono, monospace" font-size="12" font-weight="600" fill="#2a3326">${peerIds[1]}</text>

              <!-- Center (me) -->
              <circle cx="${cx}" cy="${cy}" r="24" fill="${me.accent}" stroke="#ffffff" stroke-width="3"/>
              <text x="${cx}" y="${cy + 5}" text-anchor="middle" font-family="DM Mono, monospace" font-size="14" font-weight="700" fill="#1f2a1c">${kid}</text>
            </svg>

            <div class="node-label" style="left: ${(cx / W) * 100}%; top: ${(cy + 30) / H * 100}%;">${escapeHtml(me.displayName)}</div>
            <div class="node-label" style="left: ${(l1x / W) * 100}%; top: ${(l1y + 22) / H * 100}%;">${escapeHtml(p1.displayName)}</div>
            <div class="node-label" style="left: ${(l2x / W) * 100}%; top: ${(l2y + 22) / H * 100}%;">${escapeHtml(p2.displayName)}</div>

            <div class="edge-anchor" style="left: ${m1.left}; top: ${m1.top};">${edgeAnnotation(lane1)}</div>
            <div class="edge-anchor" style="left: ${m2.left}; top: ${m2.top};">${edgeAnnotation(lane2)}</div>
          </div>
        </div>
      `;
    }

    function buildSettlementsSection(kid) {
      const settles = settlementsForKitchen(kid);
      let body;
      if (!settles.length) {
        body = `<div class="empty">No settlements yet</div>`;
      } else {
        const shown = settles.slice(0, 3);
        body = shown.map(t => {
          const counterpartyId = t.sellerKitchenId === kid ? t.buyerKitchenId : t.sellerKitchenId;
          const counterpartyProfile = counterpartyId ? STATE.kitchenProfiles[counterpartyId] : null;
          const counterpartyName = counterpartyProfile ? counterpartyProfile.displayName : "unknown";
          const arrow = t.sellerKitchenId === kid ? "→" : "←";
          return `
            <div class="settle-row">
              <span class="ts">${relTimeFromTs(t.consensusTimestamp)}</span>
              <span class="ing">${escapeHtml(t.ingredient)}</span>
              <span class="grow">${t.qtyKg} kg ${arrow} ${escapeHtml(counterpartyName)}</span>
              <span class="amount">${t.totalHbar.toFixed(2)} ℏ</span>
              <a class="hs-chip" href="${escapeHtml(t.hashscanUrl)}" target="_blank" rel="noopener">↗ HS</a>
            </div>
          `;
        }).join("");
      }
      return `
        <div class="section">
          <div class="label">Recent settlements</div>
          ${body}
        </div>
      `;
    }

    function buildPopupHTML(kid) {
      const k = STATE.kitchenProfiles[kid];
      if (!k) {
        return `<div class="card"><div class="card-header"><div>Loading…</div></div></div>`;
      }
      return `
        <div class="card">
          ${buildHeader(k)}
          ${buildOffersSection(kid)}
          ${buildNetworkSection(kid)}
          ${buildSettlementsSection(kid)}
        </div>
      `;
    }

    /* ===============================================================
       ACTIVITY FEED — merges trades + transcript into one exchange log
       =============================================================== */
    function profileName(kid) {
      const p = kid ? STATE.kitchenProfiles[kid] : null;
      return p ? p.displayName : "unknown";
    }

    function renderActivityEntry(item) {
      const ts = relTimeFromTs(item.consensusTimestamp);

      switch (item._feedKind) {
        case "OFFER": {
          const kid = item.kitchenId;
          const name = profileName(kid);
          return `
            <div class="activity-entry kind-OFFER k-${kid || ""}">
              <div class="ts-col">${ts}</div>
              <div class="body-col">
                <div class="who"><span class="dot"></span>${escapeHtml(name)}</div>
                <div class="action">
                  Posted <span class="amount">${item.qtyKg} kg</span>
                  <span class="ingredient">${escapeHtml(item.ingredient)}</span>
                  @ <span class="amount">${item.pricePerKgHbar.toFixed(2)} h/kg</span>
                </div>
                <div class="meta-row"><a class="hs-chip" href="${escapeHtml(item.hashscanUrl)}" target="_blank" rel="noopener">&#8599; HS</a></div>
              </div>
            </div>
          `;
        }
        case "PROPOSAL": {
          const fromName = profileName(item.fromKitchenId);
          const toName = profileName(item.toKitchenId);
          return `
            <div class="activity-entry kind-PROPOSAL k-${item.fromKitchenId || ""}">
              <div class="ts-col">${ts}</div>
              <div class="body-col">
                <div class="who"><span class="dot"></span>${escapeHtml(fromName)}</div>
                <div class="action">
                  Countered <span class="counterparty">${escapeHtml(toName)}</span>
                  @ <span class="amount">${item.counterPricePerKgHbar.toFixed(2)} h/kg</span>
                </div>
                <div class="meta-row"><a class="hs-chip" href="${escapeHtml(item.hashscanUrl)}" target="_blank" rel="noopener">&#8599; HS</a></div>
              </div>
            </div>
          `;
        }
        case "TRADE_EXECUTED": {
          const sellerName = profileName(item.sellerKitchenId);
          const buyerName = profileName(item.buyerKitchenId);
          return `
            <div class="activity-entry kind-TRADE_EXECUTED k-${item.sellerKitchenId || ""}">
              <div class="ts-col">${ts}</div>
              <div class="body-col">
                <div class="who"><span class="dot"></span>Trade settled</div>
                <div class="action">
                  <span class="amount">${item.qtyKg} kg</span>
                  <span class="ingredient">${escapeHtml(item.ingredient)}</span>
                  <span class="counterparty">${escapeHtml(sellerName)}</span>
                  <span class="arrow">&rarr;</span>
                  <span class="counterparty">${escapeHtml(buyerName)}</span>
                  &middot; <span class="amount">${item.totalHbar.toFixed(2)} h</span>
                </div>
                <div class="meta-row"><a class="hs-chip" href="${escapeHtml(item.hashscanUrl)}" target="_blank" rel="noopener">&#8599; HS</a></div>
              </div>
            </div>
          `;
        }
        case "REASONING": {
          const kid = item.kitchenId;
          const name = profileName(kid);
          const profile = kid ? STATE.kitchenProfiles[kid] : null;
          const branch = profile ? profile.branch : "";
          return `
            <div class="activity-entry kind-REASONING k-${kid || ""}">
              <div class="ts-col">${ts}</div>
              <div class="body-col">
                <div class="who"><span class="dot"></span>${escapeHtml(name)}${branch ? " &middot; " + escapeHtml(branch) : ""}</div>
                <div class="action">${escapeHtml(item.thought)}</div>
              </div>
            </div>
          `;
        }
        default:
          return "";
      }
    }

    function renderDrawer() {
      const el = document.getElementById("drawer-body");
      if (!el) return;

      // Merge trades + transcript into a single feed, sorted by consensus time.
      const feed = [];
      for (const t of STATE.trades) {
        feed.push(Object.assign({ _feedKind: t.kind }, t));
      }
      for (const t of STATE.transcript) {
        feed.push(Object.assign({ _feedKind: "REASONING" }, t));
      }
      // Sort newest first by consensus timestamp (string comparison works for
      // mirror node's seconds.nanos format).
      feed.sort((a, b) => {
        const ta = parseFloat(a.consensusTimestamp) || 0;
        const tb = parseFloat(b.consensusTimestamp) || 0;
        return tb - ta;
      });

      if (!feed.length) {
        el.innerHTML = `<div style="color: var(--ink-mute); font-style: italic; padding: 18px 0;">Waiting for kitchen activity&hellip;</div>`;
        return;
      }

      el.innerHTML = feed.map(renderActivityEntry).join("");
    }

    /* ===============================================================
       TOPBAR
       =============================================================== */
    function renderTopbar() {
      const n = STATE.tradesSettledToday ?? 0;
      const tradesEl = document.getElementById("trades-today");
      if (tradesEl) tradesEl.textContent = `${n} trade${n === 1 ? "" : "s"} settled today`;

      const updatedEl = document.getElementById("updated-time");
      if (updatedEl && STATE.updatedAt) {
        const dt = new Date(STATE.updatedAt);
        const hh = String(dt.getUTCHours()).padStart(2, "0");
        const mm = String(dt.getUTCMinutes()).padStart(2, "0");
        const ss = String(dt.getUTCSeconds()).padStart(2, "0");
        updatedEl.textContent = `updated ${hh}:${mm}:${ss} UTC`;
      }

      // Flip the live dot to coral when /state fetches fail. Keep last
      // snapshot visible — we just change the indicator so it's obvious
      // the data is stale.
      const dot = document.querySelector("header.topbar .meta .live .dot");
      const liveLabel = document.querySelector("header.topbar .meta .live .label");
      if (dot && liveLabel) {
        if (STATE.error) {
          dot.style.background = "var(--coral)";
          dot.style.animation = "none";
          liveLabel.textContent = "offline";
        } else {
          dot.style.background = "";
          dot.style.animation = "";
          liveLabel.textContent = "live";
        }
      }
    }

    /* ===============================================================
       MAP + PINS
       =============================================================== */
    // Token placeholder — app-server.ts replaces the string literal below
    // with process.env.MAPBOX_TOKEN at request time so the token is never
    // committed to git.
    mapboxgl.accessToken = "__MAPBOX_TOKEN__";

    const map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/light-v11",
      center: [-0.095, 51.514],    // midpoint between the three London kitchens
      zoom: 12.8,
      attributionControl: true,
      cooperativeGestures: false
    });
    map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), "top-right");

    /* ===============================================================
       NATIVE MAPBOX LAYERS — all markers + arcs are GPU-rendered
       ===============================================================
       No DOM markers = no zoom lag. Everything moves with the map
       at 60fps because it's rendered on the WebGL canvas. */

    let layersInitialized = false;
    const openPopup = { ref: null };  // track open popup for refresh

    // GeoJSON sources — updated in place via setData()
    const liveGeoJSON = { type: "FeatureCollection", features: [] };
    const onboardingGeoJSON = { type: "FeatureCollection", features: [] };
    const arcsGeoJSON = { type: "FeatureCollection", features: [] };

    function initMapLayers() {
      if (layersInitialized) return;
      layersInitialized = true;

      // --- Trade arc lines (below markers so they don't occlude) ---
      map.addSource("trade-arcs", { type: "geojson", data: arcsGeoJSON });
      map.addLayer({
        id: "trade-arcs-line",
        type: "line",
        source: "trade-arcs",
        paint: {
          "line-color": ["get", "color"],
          "line-width": 2.5,
          "line-opacity": ["get", "opacity"],
          "line-dasharray": [3, 2]
        }
      });

      // --- Onboarding kitchens (small muted circles + labels) ---
      map.addSource("onboarding-kitchens", { type: "geojson", data: onboardingGeoJSON });
      map.addLayer({
        id: "onboarding-dots",
        type: "circle",
        source: "onboarding-kitchens",
        paint: {
          "circle-radius": 5,
          "circle-color": "#c8ccc4",
          "circle-stroke-width": 1,
          "circle-stroke-color": "#b0b4ac",
          "circle-opacity": 0.6
        }
      });
      map.addLayer({
        id: "onboarding-labels",
        type: "symbol",
        source: "onboarding-kitchens",
        layout: {
          "text-field": ["get", "name"],
          "text-font": ["DIN Pro Medium", "Arial Unicode MS Regular"],
          "text-size": 11,
          "text-offset": [0, 1.4],
          "text-anchor": "top",
          "text-allow-overlap": false,
          "text-ignore-placement": false
        },
        paint: {
          "text-color": "#8a8e86",
          "text-opacity": 0.7,
          "text-halo-color": "#f5f3ee",
          "text-halo-width": 1.5
        }
      });

      // --- Live kitchens (large colored circles + bold labels) ---
      map.addSource("live-kitchens", { type: "geojson", data: liveGeoJSON });

      // Outer glow ring (pulse effect via radius animation)
      map.addLayer({
        id: "live-glow",
        type: "circle",
        source: "live-kitchens",
        paint: {
          "circle-radius": 18,
          "circle-color": ["get", "accent"],
          "circle-opacity": 0.12,
          "circle-stroke-width": 0
        }
      });

      // Main dot
      map.addLayer({
        id: "live-dots",
        type: "circle",
        source: "live-kitchens",
        paint: {
          "circle-radius": 8,
          "circle-color": ["get", "accent"],
          "circle-stroke-width": 2.5,
          "circle-stroke-color": "#ffffff"
        }
      });

      // Labels
      map.addLayer({
        id: "live-labels",
        type: "symbol",
        source: "live-kitchens",
        layout: {
          "text-field": ["get", "name"],
          "text-font": ["DIN Pro Bold", "Arial Unicode MS Bold"],
          "text-size": 13,
          "text-offset": [0, 1.6],
          "text-anchor": "top",
          "text-allow-overlap": true,
          "text-ignore-placement": true
        },
        paint: {
          "text-color": "#2a3326",
          "text-halo-color": "#f5f3ee",
          "text-halo-width": 2
        }
      });

      // Click handler for live kitchens — opens popup card
      map.on("click", "live-dots", (e) => {
        if (!e.features || !e.features.length) return;
        const f = e.features[0];
        const kid = f.properties.kid;
        const coords = f.geometry.coordinates.slice();
        // Close any existing popup
        if (openPopup.ref) { openPopup.ref.remove(); openPopup.ref = null; }
        const popup = new mapboxgl.Popup({ offset: 16, closeButton: true, maxWidth: "380px" })
          .setLngLat(coords)
          .setHTML(buildPopupHTML(kid))
          .addTo(map);
        openPopup.ref = popup;
        popup.on("close", () => { openPopup.ref = null; });
      });

      // Click handler for onboarding kitchens
      map.on("click", "onboarding-dots", (e) => {
        if (!e.features || !e.features.length) return;
        const f = e.features[0];
        const coords = f.geometry.coordinates.slice();
        if (openPopup.ref) { openPopup.ref.remove(); openPopup.ref = null; }
        const popup = new mapboxgl.Popup({ offset: 12, closeButton: true, maxWidth: "260px" })
          .setLngLat(coords)
          .setHTML(`
            <div style="padding: 14px 16px; font-family: 'DM Sans', sans-serif;">
              <div style="font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; margin-bottom: 4px;">${escapeHtml(f.properties.name)}</div>
              <div style="font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #7a7e76;">${escapeHtml(f.properties.branch)} &middot; ${escapeHtml(f.properties.cuisine)}</div>
              <div style="margin-top: 10px; font-size: 12px; color: #9a9e96; font-style: italic;">Joining the Peel network</div>
            </div>
          `)
          .addTo(map);
        openPopup.ref = popup;
        popup.on("close", () => { openPopup.ref = null; });
      });

      // Cursor change on hover
      for (const layerId of ["live-dots", "onboarding-dots"]) {
        map.on("mouseenter", layerId, () => { map.getCanvas().style.cursor = "pointer"; });
        map.on("mouseleave", layerId, () => { map.getCanvas().style.cursor = ""; });
      }

      // Build onboarding features (static, only once)
      onboardingGeoJSON.features = ONBOARDING_KITCHENS.map(k => ({
        type: "Feature",
        geometry: { type: "Point", coordinates: [k.lng, k.lat] },
        properties: { name: k.name, branch: k.branch, cuisine: k.cuisine }
      }));
      map.getSource("onboarding-kitchens").setData(onboardingGeoJSON);
    }

    // Rebuild live kitchen features from ALL_KITCHENS + STATE.kitchenProfiles
    function refreshLiveMarkers() {
      liveGeoJSON.features = LIVE_KITCHENS.map(k => ({
        type: "Feature",
        geometry: { type: "Point", coordinates: [k.lng, k.lat] },
        properties: {
          kid: k.id,
          name: k.name,
          accent: k.accent
        }
      }));
      const src = map.getSource("live-kitchens");
      if (src) src.setData(liveGeoJSON);
    }

    // Compatibility shims — called by existing code
    const markers = { A: true, B: true, C: true };  // always "exist" for ensureMarkers guard
    function ensureMarkers() { refreshLiveMarkers(); }
    function addPeripheralMarkers() { /* handled by initMapLayers */ }
    function refreshMarkerActivity() { /* glow layer handles this visually */ }
    function refreshAllPopups() {
      // If a popup is open, refresh its content
      if (openPopup.ref && openPopup.ref._content) {
        const el = openPopup.ref.getElement();
        if (el) {
          const kidEl = el.querySelector("[data-kid]");
          // Can't easily detect kid from open popup — skip live refresh.
          // Popup rebuilds on next click.
        }
      }
    }

    /* ===============================================================
       TRADE ARCS — native Mapbox line layer (GPU-rendered)
       =============================================================== */
    const renderedArcs = new Set();
    let arcFeatures = [];

    function renderTradeArcs() {
      const WINDOW_MS = 10 * 60 * 1000;  // show arcs for last 10 min
      const nowMs = Date.now();
      let changed = false;

      for (const t of STATE.trades) {
        if (t.kind !== "TRADE_EXECUTED") continue;
        if (renderedArcs.has(t.seq)) continue;

        const sec = parseFloat(t.consensusTimestamp);
        if (!Number.isFinite(sec) || nowMs - sec * 1000 > WINDOW_MS) continue;

        // Look up coords from ALL_KITCHENS
        const sellerK = ALL_KITCHENS.find(k => k.id === t.sellerKitchenId);
        const buyerK = ALL_KITCHENS.find(k => k.id === t.buyerKitchenId);
        if (!sellerK || !buyerK) continue;

        renderedArcs.add(t.seq);
        changed = true;

        const age = (nowMs - sec * 1000) / 1000;
        const opacity = Math.max(0.15, 1 - age / 600);  // fade over 10 min

        arcFeatures.push({
          type: "Feature",
          geometry: {
            type: "LineString",
            coordinates: [
              [sellerK.lng, sellerK.lat],
              [buyerK.lng, buyerK.lat]
            ]
          },
          properties: {
            color: sellerK.accent,
            opacity,
            seq: t.seq,
            createdAt: sec
          }
        });
      }

      // Also fade existing arcs over time
      arcFeatures = arcFeatures.filter(f => {
        const age = (nowMs / 1000) - f.properties.createdAt;
        if (age > 600) return false;  // drop after 10 min
        f.properties.opacity = Math.max(0.15, 1 - age / 600);
        return true;
      });

      if (changed || arcFeatures.length > 0) {
        arcsGeoJSON.features = arcFeatures;
        const src = map.getSource("trade-arcs");
        if (src) src.setData(arcsGeoJSON);
      }
    }

    /* ===============================================================
       EXPANDED KITCHEN REGISTRY — all restaurants on the Peel network
       =============================================================== */
    const ALL_KITCHENS = [
      // Active kitchens (have Hedera accounts, trading live)
      { id: "A", name: "Dishoom",        branch: "Shoreditch",      cuisine: "Indian",           accent: "#A8D66B", lat: 51.5253, lng: -0.0766, status: "live" },
      { id: "B", name: "Pret a Manger",  branch: "Borough High St", cuisine: "Cafe / deli",      accent: "#F4A39A", lat: 51.5043, lng: -0.0909, status: "live" },
      { id: "C", name: "Wagamama",       branch: "Covent Garden",   cuisine: "Japanese",         accent: "#5E8C6A", lat: 51.5117, lng: -0.1225, status: "live" },
      // Onboarding kitchens (visible, will join the network)
      { id: "D", name: "Nando's",        branch: "Camden",          cuisine: "Peri-peri chicken", accent: "#E85D4A", lat: 51.5392, lng: -0.1426, status: "onboarding" },
      { id: "E", name: "Eat Tokyo",      branch: "Clerkenwell",     cuisine: "Japanese",         accent: "#D4A574", lat: 51.5230, lng: -0.1050, status: "onboarding" },
      { id: "F", name: "Wasabi",         branch: "Liverpool St",    cuisine: "Japanese fast",    accent: "#8BC34A", lat: 51.5180, lng: -0.0810, status: "onboarding" },
      { id: "G", name: "Honest Burgers", branch: "Brixton",         cuisine: "Burgers",          accent: "#C19A6B", lat: 51.4613, lng: -0.1145, status: "onboarding" },
      { id: "H", name: "Flat Iron",      branch: "Shoreditch",      cuisine: "Steak",            accent: "#B8584B", lat: 51.5246, lng: -0.0810, status: "onboarding" },
      { id: "I", name: "GAIL's",         branch: "Hackney",         cuisine: "Bakery & brunch",  accent: "#DEB887", lat: 51.5465, lng: -0.0553, status: "onboarding" },
      { id: "J", name: "Padella",        branch: "Borough",         cuisine: "Fresh pasta",      accent: "#E8C170", lat: 51.5055, lng: -0.0920, status: "onboarding" },
      { id: "K", name: "Bao",            branch: "Soho",            cuisine: "Taiwanese",        accent: "#D4A39A", lat: 51.5133, lng: -0.1320, status: "onboarding" },
      { id: "L", name: "Leon",           branch: "Spitalfields",    cuisine: "Healthy fast",     accent: "#F5C518", lat: 51.5183, lng: -0.0757, status: "onboarding" },
      { id: "M", name: "The Palomar",    branch: "Soho",            cuisine: "Jerusalem grill",  accent: "#7B9EA8", lat: 51.5115, lng: -0.1345, status: "onboarding" },
      { id: "N", name: "Franco Manca",   branch: "Brixton",         cuisine: "Sourdough pizza",  accent: "#E07B54", lat: 51.4617, lng: -0.1135, status: "onboarding" },
      { id: "O", name: "Ottolenghi",     branch: "Islington",       cuisine: "Mediterranean",    accent: "#A8C68F", lat: 51.5385, lng: -0.1030, status: "onboarding" },
      { id: "P", name: "Hawksmoor",      branch: "Spitalfields",    cuisine: "Steak & seafood",  accent: "#8B4513", lat: 51.5195, lng: -0.0772, status: "onboarding" },
      { id: "Q", name: "Pizza Pilgrims", branch: "Dean St",         cuisine: "Neapolitan pizza", accent: "#D4483B", lat: 51.5138, lng: -0.1312, status: "onboarding" },
    ];

    const LIVE_KITCHENS = ALL_KITCHENS.filter(k => k.status === "live");
    const ONBOARDING_KITCHENS = ALL_KITCHENS.filter(k => k.status === "onboarding");

    /* ===============================================================
       SIDEBAR RENDERER
       =============================================================== */
    let selectedKitchenId = null;

    function renderSidebar() {
      const el = document.getElementById("sidebar-body");
      if (!el) return;

      let html = '<div class="sidebar-section-label">Active on Hedera</div>';

      for (const k of LIVE_KITCHENS) {
        const isSelected = selectedKitchenId === k.id;
        html += `
          <div class="kitchen-item ${isSelected ? "active" : ""}" data-kid="${k.id}" onclick="selectKitchen('${k.id}')">
            <span class="k-dot" style="background: ${escapeHtml(k.accent)}; color: ${escapeHtml(k.accent)};"></span>
            <div class="k-info">
              <div class="k-name">${escapeHtml(k.name)}</div>
              <div class="k-branch">${escapeHtml(k.branch)}</div>
            </div>
            <span class="k-status live">live</span>
          </div>
        `;
      }

      html += '<div class="sidebar-section-label">Onboarding</div>';

      for (const k of ONBOARDING_KITCHENS) {
        html += `
          <div class="kitchen-item" data-kid="${k.id}" onclick="selectKitchen('${k.id}')">
            <span class="k-dot" style="background: var(--border-2);"></span>
            <div class="k-info">
              <div class="k-name">${escapeHtml(k.name)}</div>
              <div class="k-branch">${escapeHtml(k.branch)}</div>
            </div>
            <span class="k-status pending">soon</span>
          </div>
        `;
      }

      el.innerHTML = html;

      // Update active kitchen count in drawer header
      const countEl = document.getElementById("active-count");
      if (countEl) countEl.textContent = `${LIVE_KITCHENS.length} active · ${ONBOARDING_KITCHENS.length} onboarding`;
    }

    function selectKitchen(kid) {
      selectedKitchenId = kid;
      renderSidebar();

      // Fly to the kitchen's location
      const k = ALL_KITCHENS.find(x => x.id === kid);
      if (!k) return;
      map.flyTo({ center: [k.lng, k.lat], zoom: 14, duration: 800 });

      // Open the popup if it's a live kitchen with a marker
      if (markers[kid] && popups[kid]) {
        for (const pk of Object.values(popups)) {
          if (pk && pk.isOpen()) pk.remove();
        }
        markers[kid].togglePopup();
      }
    }

    /* ===============================================================
       SIMULATION ENGINE — synthetic Hedera events for demo feel
       ===============================================================
       Generates realistic-looking REASONING, OFFER, PROPOSAL, and
       TRADE_EXECUTED events and injects them into STATE so the
       activity feed appears alive even when agents aren't running. */

    const SIM_INGREDIENTS = ["RICE", "PASTA", "FLOUR", "OIL"];
    const SIM_THOUGHTS = [
      "Reviewing surplus forecast for the week ahead — RICE stock is high relative to projected covers.",
      "Current PASTA inventory sits 12 kg above forecast. Scanning the market for buyers.",
      "OIL reserves are comfortable but approaching ceiling. Considering a small listing.",
      "FLOUR demand is soft this week — diners are pivoting to rice dishes. Time to offload.",
      "Checking peer offers. Wagamama has RICE at a good price — evaluating counter.",
      "Market scan complete. Two open offers on PASTA, both above my floor. Holding.",
      "Surplus in RICE confirmed at 18 kg. Posting an offer at 15% below market rate.",
      "Dishoom's OIL offer looks strong — 0.62 ℏ/kg is well within my ceiling.",
      "Running cost analysis on FLOUR. Current price of 0.45 ℏ/kg is attractive to buy.",
      "Inventory rebalance: sold 8 kg PASTA to Pret a Manger. Net position improved.",
      "Evening prep data suggests lower RICE usage tomorrow. Increasing surplus listing.",
      "Wagamama's counter on my FLOUR offer is fair. Proceeding to settlement.",
      "Post-lunch inventory check: OIL consumption was 20% below forecast. Listing surplus.",
      "Three active offers on the market right now. My PASTA is the most competitive.",
      "Weekend forecast shows high covers — holding RICE reserves, withdrawing surplus offer.",
    ];

    let simSeqCounter = 10000;
    let simRunning = false;

    function simNow() {
      return (Date.now() / 1000).toFixed(9);
    }

    function simPick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function simRandRange(min, max) {
      return Math.round((min + Math.random() * (max - min)) * 100) / 100;
    }

    function generateSimEvent() {
      const roll = Math.random();
      const seq = simSeqCounter++;
      const ts = simNow();
      const kid = simPick(["A", "B", "C"]);
      const ingredient = simPick(SIM_INGREDIENTS);
      const hashscanUrl = `https://hashscan.io/testnet/topic/0.0.sim/${seq}`;

      if (roll < 0.35) {
        return {
          _target: "transcript",
          entry: {
            seq, consensusTimestamp: ts, kitchenId: kid,
            kitchenAccountId: "0.0.sim",
            thought: simPick(SIM_THOUGHTS),
            hashscanUrl
          }
        };
      } else if (roll < 0.65) {
        return {
          _target: "trades",
          entry: {
            kind: "OFFER", seq, consensusTimestamp: ts,
            kitchenId: kid, kitchenAccountId: "0.0.sim",
            ingredient, qtyKg: simRandRange(5, 25),
            pricePerKgHbar: simRandRange(0.30, 1.10),
            hashscanUrl
          }
        };
      } else if (roll < 0.85) {
        const peers = ["A", "B", "C"].filter(x => x !== kid);
        return {
          _target: "trades",
          entry: {
            kind: "PROPOSAL", seq, consensusTimestamp: ts,
            fromKitchenId: kid,
            toKitchenId: simPick(peers),
            counterPricePerKgHbar: simRandRange(0.35, 0.95),
            hashscanUrl
          }
        };
      } else {
        const peers = ["A", "B", "C"].filter(x => x !== kid);
        const qty = simRandRange(5, 20);
        const price = simRandRange(0.35, 0.90);
        return {
          _target: "trades",
          entry: {
            kind: "TRADE_EXECUTED", seq, consensusTimestamp: ts,
            sellerKitchenId: kid,
            buyerKitchenId: simPick(peers),
            ingredient, qtyKg: qty,
            totalHbar: Math.round(qty * price * 100) / 100,
            hashscanUrl
          }
        };
      }
    }

    function injectSimEvent() {
      const event = generateSimEvent();
      if (event._target === "transcript") {
        STATE.transcript = [event.entry, ...STATE.transcript].slice(0, 100);
      } else {
        STATE.trades = [event.entry, ...STATE.trades].slice(0, 100);
        if (event.entry.kind === "TRADE_EXECUTED") {
          STATE.tradesSettledToday = (STATE.tradesSettledToday || 0) + 1;
        }
      }
      renderTopbar();
      renderDrawer();
      refreshMarkerActivity();
      refreshAllPopups();
      renderTradeArcs();
    }

    function startSimulation() {
      if (simRunning) return;
      simRunning = true;

      // Seed a few initial events so the feed isn't empty on load
      for (let i = 0; i < 6; i++) {
        const event = generateSimEvent();
        const offset = (6 - i) * 15;
        event.entry.consensusTimestamp = ((Date.now() / 1000) - offset).toFixed(9);
        event.entry.seq = simSeqCounter++;
        if (event._target === "transcript") {
          STATE.transcript.push(event.entry);
        } else {
          STATE.trades.push(event.entry);
          if (event.entry.kind === "TRADE_EXECUTED") {
            STATE.tradesSettledToday = (STATE.tradesSettledToday || 0) + 1;
          }
        }
      }

      // Drip in events at random intervals (2–6 seconds)
      function scheduleNext() {
        const delay = 2000 + Math.random() * 4000;
        setTimeout(() => {
          if (!simRunning) return;
          injectSimEvent();
          scheduleNext();
        }, delay);
      }
      scheduleNext();
    }

    /* ===============================================================
       POLL LOOP — polls /state (local dev) or /api/state (Vercel)
       =============================================================== */
    const POLL_INTERVAL_MS = 3000;
    // On Vercel, the serverless function lives at /api/state.
    // Locally (app-server.ts), it's /state. Auto-detect by trying /state
    // first; if it 404s, switch to /api/state for the rest of the session.
    let stateUrl = "/state";

    async function pollState() {
      try {
        let resp = await fetch(stateUrl, { cache: "no-store" });
        if (resp.status === 404 && stateUrl === "/state") {
          stateUrl = "/api/state";
          resp = await fetch(stateUrl, { cache: "no-store" });
        }
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const next = await resp.json();
        STATE = Object.assign({}, STATE, next, { error: null });
        rebuildAccountMap();
        ensureMarkers();
        addPeripheralMarkers();
        renderTopbar();
        renderDrawer();
        refreshMarkerActivity();
        refreshAllPopups();
        renderTradeArcs();
      } catch (err) {
        const msg = err instanceof Error ? err.message : String(err);
        console.error("[h8] /state poll failed:", msg);
        STATE = Object.assign({}, STATE, { error: msg });
        renderTopbar();
        // Don't clobber the drawer / markers on failure — keep the last
        // good snapshot visible and just flip the status indicator.
      }
    }

    // Kick off after the map has finished its first render so marker
    // creation has a valid map to attach to. Then poll on a 3s interval.
    map.on("load", () => {
      initMapLayers();
      renderSidebar();
      startSimulation();
      // Initial render with seeded simulation data
      refreshLiveMarkers();
      renderTopbar();
      renderDrawer();
      renderTradeArcs();
      // Then start polling /state (merges real data when server is running)
      void pollState();
      setInterval(() => { void pollState(); }, POLL_INTERVAL_MS);
    });
  </script>
